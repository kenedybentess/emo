<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Injeção Full</title>
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); font-size: 12px; }
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 98%; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Painel de Entrada/Saída */
        .panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; background: #eee; padding: 15px; border-radius: 6px; margin-bottom: 10px; border: 2px solid #ccc; }
        .modo-saida { border-color: var(--exit); background: #fff5eb; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 9px; font-weight: bold; margin-bottom: 2px; color: #444; }
        input, select { padding: 6px; border: 1px solid #bbb; border-radius: 4px; }
        input:disabled { background: #e0e0e0; color: #999; }

        .btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-reg { background: var(--primary); flex-grow: 2; font-size: 14px; }
        .btn-exp { background: #217346; flex-grow: 1; }

        /* Tabelas */
        .section-title { background: #ddd; padding: 5px 10px; font-weight: bold; margin-top: 15px; border-left: 4px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 5px; }
        th { background: #f8f9fa; color: #333; padding: 8px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .saldo-valor { font-weight: bold; font-size: 14px; }
        .alerta { color: var(--danger); font-weight: bold; }
        .ok { color: var(--entry); }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold;">CONTROLO DE PRODUÇÃO I9 - FULL</div>
    <div id="relogio"></div>
</div>

<div class="container">
    <div class="panel" id="painel">
        <div class="form-group">
            <label>OPERAÇÃO</label>
            <select id="tipoMov" onchange="alternarModo()">
                <option value="ENTRADA">➕ ENTRADA (PRODUÇÃO)</option>
                <option value="SAIDA">➖ SAÍDA (EXPEDIÇÃO)</option>
            </select>
        </div>
        <div class="form-group"><label>CÓDIGO</label><input type="text" id="cod"></div>
        <div class="form-group"><label>PRODUTO</label><input type="text" id="prod" class="f-completo"></div>
        <div class="form-group"><label>DESCRIÇÃO</label><input type="text" id="desc" class="f-completo"></div>
        <div class="form-group"><label>ORDEM</label><input type="text" id="ordem" class="f-completo"></div>
        <div class="form-group"><label>QTD</label><input type="number" id="qtd"></div>
        <div class="form-group"><label>PESO UM</label><input type="text" id="peso" class="f-completo"></div>
        <div class="form-group"><label>OPERADOR</label><input type="text" id="operador" class="f-completo"></div>
        <div class="form-group"><label>CQ</label><input type="text" id="cq" class="f-completo"></div>
    </div>

    <div class="btns">
        <button id="btnAcao" class="btn-reg" onclick="registrar()">REGISTRAR MOVIMENTAÇÃO</button>
        <button class="btn-exp" onclick="exportar()">📥 EXPORTAR EXCEL (.CSV)</button>
    </div>

    <div class="section-title">📊 STATUS ATUAL DO ESTOQUE (SALDO)</div>
    <table>
        <thead>
            <tr>
                <th>CÓDIGO</th>
                <th>PRODUTO / DESCRIÇÃO</th>
                <th>ENTRADAS</th>
                <th>SAÍDAS</th>
                <th>SALDO ATUAL</th>
                <th>SITUAÇÃO</th>
            </tr>
        </thead>
        <tbody id="corpoStatus"></tbody>
    </table>

    <div class="section-title">🕒 ÚLTIMOS LANÇAMENTOS</div>
    <table style="font-size: 11px;">
        <thead>
            <tr>
                <th>DATA</th>
                <th>TIPO</th>
                <th>CÓDIGO</th>
                <th>QTD</th>
                <th>ORDEM</th>
                <th>OPERADOR</th>
                <th>EXCLUIR</th>
            </tr>
        </thead>
        <tbody id="corpoHist"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('i9_db_v5')) || [];

    function alternarModo() {
        const tipo = document.getElementById('tipoMov').value;
        const campos = document.querySelectorAll('.f-completo');
        const painel = document.getElementById('painel');
        const btn = document.getElementById('btnAcao');

        if(tipo === 'SAIDA') {
            campos.forEach(c => { c.disabled = true; c.value = "---"; });
            painel.classList.add('modo-saida');
            btn.style.background = "var(--exit)";
            btn.innerText = "CONFIRMAR SAÍDA RÁPIDA";
        } else {
            campos.forEach(c => { c.disabled = false; c.value = ""; });
            painel.classList.remove('modo-saida');
            btn.style.background = "var(--primary)";
            btn.innerText = "REGISTRAR MOVIMENTAÇÃO";
        }
    }

    function registrar() {
        const mov = {
            id: Date.now(),
            tipo: document.getElementById('tipoMov').value,
            cod: document.getElementById('cod').value.trim().toUpperCase(),
            prod: document.getElementById('prod').value,
            desc: document.getElementById('desc').value,
            ordem: document.getElementById('ordem').value,
            qtd: parseInt(document.getElementById('qtd').value) || 0,
            peso: document.getElementById('peso').value,
            operador: document.getElementById('operador').value,
            cq: document.getElementById('cq').value,
            data: new Date().toLocaleString('pt-BR')
        };

        if(!mov.cod || mov.qtd <= 0) return alert("Por favor, preencha o Código e a Quantidade!");

        db.unshift(mov);
        localStorage.setItem('i9_db_v5', JSON.stringify(db));
        
        document.getElementById('cod').value = "";
        document.getElementById('qtd').value = "";
        document.getElementById('cod').focus();
        
        atualizarTelas();
    }

    function atualizarTelas() {
        // 1. Renderizar Histórico
        const hist = document.getElementById('corpoHist');
        hist.innerHTML = '';
        db.slice(0, 10).forEach(m => {
            hist.innerHTML += `<tr>
                <td>${m.data}</td>
                <td style="color:${m.tipo === 'ENTRADA' ? 'green' : 'orange'}; font-weight:bold">${m.tipo}</td>
                <td>${m.cod}</td>
                <td>${m.tipo === 'SAIDA' ? '-' : '+'}${m.qtd}</td>
                <td>${m.ordem}</td>
                <td>${m.operador}</td>
                <td><button onclick="excluir(${m.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
            </tr>`;
        });

        // 2. Renderizar Saldo (Status)
        const statusCorpo = document.getElementById('corpoStatus');
        statusCorpo.innerHTML = '';
        const consolidado = {};

        db.forEach(m => {
            if(!consolidado[m.cod]) consolidado[m.cod] = { prod: m.prod, desc: m.desc, e: 0, s: 0 };
            if(m.tipo === 'ENTRADA') consolidado[m.cod].e += m.qtd;
            else consolidado[m.cod].s += m.qtd;
        });

        for(let c in consolidado) {
            const saldo = consolidado[c].e - consolidado[c].s;
            statusCorpo.innerHTML += `<tr>
                <td><b>${c}</b></td>
                <td>${consolidado[c].prod} | ${consolidado[c].desc}</td>
                <td>${consolidado[c].e}</td>
                <td>${consolidado[c].s}</td>
                <td class="saldo-valor ${saldo < 100 ? 'alerta' : 'ok'}">${saldo}</td>
                <td>${saldo <= 0 ? '❌ ESGOTADO' : saldo < 100 ? '⚠️ REPOR' : '✅ OK'}</td>
            </tr>`;
        }
    }

    function excluir(id) {
        if(confirm("Deseja apagar este registo?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('i9_db_v5', JSON.stringify(db));
            atualizarTelas();
        }
    }

    function exportar() {
        let csv = '\uFEFFDATA;TIPO;CODIGO;PRODUTO;DESCRIÇÃO;ORDEM;QTD;PESO UM;OPERADOR;CQ\n';
        db.forEach(m => {
            csv += `${m.data};${m.tipo};${m.cod};${m.prod};${m.desc};${m.ordem};${m.qtd};${m.peso};${m.operador};${m.cq}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "I9_Injecao_Producao.csv";
        link.click();
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    atualizarTelas();
</script>
</body>
</html>
