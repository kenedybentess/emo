<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Industrial Bentes</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: #007aff;
  color: white;
  border: none;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar Conta</button>
</div>

<!-- SISTEMA -->
<div id="app" class="hidden">

  <div class="card">
    <h1>📦 Estoque Industrial Bentes</h1>
    <button onclick="logout()">Sair</button>
  </div>

  <!-- CADASTRO -->
  <div class="card">
    <h3>Adicionar Produto</h3>
    <input id="nome" placeholder="Nome do produto">
    <input id="qtd" type="number" placeholder="Quantidade">
    <button onclick="addProduto()">Salvar</button>
  </div>

  <!-- DASHBOARD -->
  <div class="card">
    <h3>Dashboard</h3>
    <p><strong>Total de itens:</strong> <span id="total">0</span></p>
    <ul id="lista"></ul>
  </div>

</div>

</div>

<!-- APP -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAgBZ2zkp-7s0GGe2tt99OfNpR3FBqKopI",
  authDomain: "estoque-bentes.firebaseapp.com",
  databaseURL: "https://estoque-bentes-default-rtdb.firebaseio.com",
  projectId: "estoque-bentes",
  storageBucket: "estoque-bentes.firebasestorage.app",
  messagingSenderId: "611827952922",
  appId: "1:611827952922:web:989c5e956094b77dac90a3"
};

// INICIAR
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// LOGIN
window.login = function() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  signInWithEmailAndPassword(auth, email, senha)
    .catch(e => alert(e.message));
}

// REGISTRAR
window.register = function() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(() => alert("Conta criada!"))
    .catch(e => alert(e.message));
}

// LOGOUT
window.logout = function() {
  signOut(auth);
}

// SESSÃO
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    carregar();
  } else {
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

// ADICIONAR PRODUTO
window.addProduto = function() {
  const nome = document.getElementById('nome').value;
  const qtd = parseInt(document.getElementById('qtd').value);

  if (!nome || !qtd) {
    alert("Preencha tudo");
    return;
  }

  push(ref(db, "produtos"), {
    nome,
    qtd
  });
}

// DASHBOARD
function carregar() {
  onValue(ref(db, "produtos"), (snapshot) => {
    const dados = snapshot.val() || {};
    const lista = document.getElementById('lista');

    lista.innerHTML = "";
    let total = 0;

    Object.values(dados).forEach(p => {
      total += p.qtd;
      lista.innerHTML += `<li>${p.nome} - ${p.qtd}</li>`;
    });

    document.getElementById('total').innerText = total;
  });
}

</script>

</body>
</html>
