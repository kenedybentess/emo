<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGE - Controle de Injeção I9 FULL2</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); font-size: 13px; }
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 98%; margin: 15px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #eee; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; margin-bottom: 3px; color: #555; }
        input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btns { margin-bottom: 15px; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-add { background: var(--success); }
        .btn-export { background: #217346; }
        .btn-import { background: var(--secondary); }

        #busca { width: 100%; padding: 10px; border: 2px solid var(--primary); border-radius: 5px; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary); color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #fafafa; }
        
        .btn-edit { background: var(--warning); padding: 4px 8px; font-size: 11px; margin-right: 5px; }
        .btn-del { background: var(--danger); padding: 4px 8px; font-size: 11px; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold;">CONTROLE DE PRODUÇÃO - INJEÇÃO I9</div>
    <div id="data"></div>
</div>

<div class="container">
    <input type="hidden" id="editIndex" value="-1">

    <div class="panel">
        <div class="form-group"><label>CODIGO</label><input type="text" id="cod"></div>
        <div class="form-group"><label>PRODUTO</label><input type="text" id="prod"></div>
        <div class="form-group"><label>DESCRIÇÃO</label><input type="text" id="desc"></div>
        <div class="form-group"><label>ORDEM</label><input type="text" id="ordem"></div>
        <div class="form-group"><label>QTD</label><input type="number" id="qtd"></div>
        <div class="form-group"><label>PESO UM</label><input type="text" id="peso"></div>
        <div class="form-group"><label>OPERADOR</label><input type="text" id="operador"></div>
        <div class="form-group"><label>CQ</label><input type="text" id="cq"></div>
    </div>

    <div class="btns">
        <button class="btn-add" id="btnSalvar" onclick="salvarRegisto()">➕ REGISTRAR / SALVAR</button>
        <button class="btn-export" onclick="exportarCSV()">📥 EXPORTAR EXCEL</button>
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">📤 IMPORTAR</button>
        <input type="file" id="fileInput" accept=".csv" onchange="importarCSV(event)">
    </div>

    <input type="text" id="busca" placeholder="🔍 Pesquisar em todos os campos..." onkeyup="filtrar()">

    <table>
        <thead>
            <tr>
                <th>CÓDIGO</th>
                <th>PRODUTO</th>
                <th>DESCRIÇÃO</th>
                <th>ORDEM</th>
                <th>QTD</th>
                <th>PESO UM</th>
                <th>OPERADOR</th>
                <th>CQ</th>
                <th>DATA</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    let dados = JSON.parse(localStorage.getItem('dados_injecao_v3')) || [];

    function atualizarLocalStorage() {
        localStorage.setItem('dados_injecao_v3', JSON.stringify(dados));
        renderizar();
    }

    function salvarRegisto() {
        const index = document.getElementById('editIndex').value;
        const novo = {
            cod: document.getElementById('cod').value,
            prod: document.getElementById('prod').value,
            desc: document.getElementById('desc').value,
            ordem: document.getElementById('ordem').value,
            qtd: document.getElementById('qtd').value,
            peso: document.getElementById('peso').value,
            operador: document.getElementById('operador').value,
            cq: document.getElementById('cq').value,
            data: new Date().toLocaleString('pt-BR')
        };

        if(!novo.cod || !novo.qtd) return alert("Preencha Código e Quantidade!");

        if(index === "-1") {
            dados.unshift(novo); // Novo registo no topo
        } else {
            dados[index] = novo; // Atualiza o existente
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSalvar').innerText = "➕ REGISTRAR / SALVAR";
            document.getElementById('btnSalvar').style.background = "#27ae60";
        }

        atualizarLocalStorage();
        limparCampos();
    }

    function editar(index) {
        const d = dados[index];
        document.getElementById('cod').value = d.cod;
        document.getElementById('prod').value = d.prod;
        document.getElementById('desc').value = d.desc;
        document.getElementById('ordem').value = d.ordem;
        document.getElementById('qtd').value = d.qtd;
        document.getElementById('peso').value = d.peso;
        document.getElementById('operador').value = d.operador;
        document.getElementById('cq').value = d.cq;
        
        document.getElementById('editIndex').value = index;
        document.getElementById('btnSalvar').innerText = "💾 ATUALIZAR REGISTO";
        document.getElementById('btnSalvar').style.background = "#f39c12";
        window.scrollTo(0,0);
    }

    function excluir(index) {
        if(confirm("Tem certeza que deseja excluir este registo?")) {
            dados.splice(index, 1);
            atualizarLocalStorage();
        }
    }

    function exportarCSV() {
        let csv = '\uFEFFCODIGO;PRODUTO;DESCRIÇÃO;ORDEM;QTD;PESO UM;OPERADOR;CQ;DATA\n';
        dados.forEach(d => {
            csv += `${d.cod};${d.prod};${d.desc};${d.ordem};${d.qtd};${d.peso};${d.operador};${d.cq};${d.data}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Injecao_I9_Producao.csv";
        link.click();
    }

    function importarCSV(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const linhas = e.target.result.split('\n').slice(1);
            linhas.forEach(l => {
                const c = l.split(';');
                if(c.length >= 8) {
                    dados.push({
                        cod: c[0], prod: c[1], desc: c[2], ordem: c[3],
                        qtd: c[4], peso: c[5], operador: c[6], cq: c[7], data: c[8] || '-'
                    });
                }
            });
            atualizarLocalStorage();
        };
        reader.readAsText(event.target.files[0]);
    }

    function filtrar() {
        const t = document.getElementById('busca').value.toLowerCase();
        document.querySelectorAll('tbody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(t) ? '' : 'none';
        });
    }

    function renderizar() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        dados.forEach((d, index) => {
            corpo.innerHTML += `
                <tr>
                    <td>${d.cod}</td>
                    <td>${d.prod}</td>
                    <td>${d.desc}</td>
                    <td>${d.ordem}</td>
                    <td><b>${d.qtd}</b></td>
                    <td>${d.peso}</td>
                    <td>${d.operador}</td>
                    <td>${d.cq}</td>
                    <td>${d.data}</td>
                    <td>
                        <button class="btn-edit" onclick="editar(${index})">📝</button>
                        <button class="btn-del" onclick="excluir(${index})">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function limparCampos() {
        ["cod", "prod", "desc", "ordem", "qtd", "peso", "operador", "cq"].forEach(id => document.getElementById(id).value = "");
        document.getElementById('editIndex').value = "-1";
    }

    document.getElementById('data').innerText = new Date().toLocaleDateString();
    renderizar();
</script>
</body>
</html>
