<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Controlo Industrial</title>
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --danger: #e74c3c; --info: #3498db; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); font-size: 13px; color: #333; }
        
        .navbar { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }

        /* Pesquisa Global */
        .search-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; border-top: 5px solid var(--info); }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 15px; outline: none; }
        .search-box::before { content: '🔍'; position: absolute; left: 12px; font-size: 18px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-weight: bold; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }
        input:read-only { background: #f1f2f6; color: #555; font-weight: bold; }

        button { cursor: pointer; padding: 12px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-blue { background: var(--info); width: 100%; }
        .btn-dark { background: var(--primary); width: 100%; margin-top: 10px; }

        /* Tabelas */
        .table-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-pill { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .bg-ok { background: #d4edda; color: #155724; }
        .bg-zero { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-size: 18px; font-weight: bold;">SGE - I9 INDUSTRIAL</div>
    <div id="relogio"></div>
</div>

<div class="container">

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="inputPesquisa" placeholder="Pesquisar em tudo (Código, Produto, Descrição, Operador...)" onkeyup="renderizar()">
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">📂 Cadastro (Definir Descrição)</div>
            <div class="form-grid">
                <div class="form-group"><label>CÓDIGO</label><input type="text" id="cad_cod"></div>
                <div class="form-group"><label>PRODUTO</label><input type="text" id="cad_prod"></div>
                <div class="form-group" style="grid-column: span 2;"><label>DESCRIÇÃO DETALHADA</label><input type="text" id="cad_desc"></div>
            </div>
            <button class="btn-blue" onclick="salvarProduto()">SALVAR NO BANCO DE DADOS</button>
        </div>

        <div class="card">
            <div class="card-title">🚀 Movimentação</div>
            <div class="form-grid">
                <div class="form-group"><label>OPERAÇÃO</label>
                    <select id="mov_tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
                </div>
                <div class="form-group"><label>CÓDIGO</label><input type="text" id="mov_cod" oninput="procv(this.value)"></div>
                <div class="form-group"><label>PRODUTO</label><input type="text" id="mov_nome" readonly></div>
                <div class="form-group"><label>DESCRIÇÃO</label><input type="text" id="mov_desc_auto" readonly></div>
                <div class="form-group"><label>QUANTIDADE</label><input type="number" id="mov_qtd"></div>
                <div class="form-group"><label>OPERADOR</label><input type="text" id="mov_ope"></div>
            </div>
            <button class="btn-dark" onclick="lancar()">REGISTAR MOVIMENTO</button>
        </div>
    </div>

    <div class="table-container">
        <div class="card-title">📊 Status Atual do Stock</div>
        <table>
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>PRODUTO</th>
                    <th>DESCRIÇÃO</th>
                    <th>SALDO</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="corpoSaldo"></tbody>
        </table>
    </div>

    <div class="table-container">
        <div class="card-title">🕒 Histórico de Movimentações</div>
        <table>
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>TIPO</th>
                    <th>CÓDIGO</th>
                    <th>PRODUTO / DESCRIÇÃO</th>
                    <th>QTD</th>
                    <th>OPERADOR</th>
                </tr>
            </thead>
            <tbody id="corpoHist"></tbody>
        </table>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('i9_v2_produtos')) || {};
    let historico = JSON.parse(localStorage.getItem('i9_v2_logs')) || [];

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.trim().toUpperCase();
        const prod = document.getElementById('cad_prod').value.trim();
        const desc = document.getElementById('cad_desc').value.trim();
        if(!cod || !prod) return alert("Preencha o código e o nome!");
        produtos[cod] = { prod, desc };
        localStorage.setItem('i9_v2_produtos', JSON.stringify(produtos));
        alert("Produto e Descrição guardados!");
        renderizar();
    }

    function procv(valor) {
        valor = valor.toUpperCase().trim();
        const campoNome = document.getElementById('mov_nome');
        const campoDesc = document.getElementById('mov_desc_auto');
        if(produtos[valor]) {
            campoNome.value = produtos[valor].prod;
            campoDesc.value = produtos[valor].desc;
        } else {
            campoNome.value = "NÃO ENCONTRADO";
            campoDesc.value = "Registe no Cadastro";
        }
    }

    function lancar() {
        const cod = document.getElementById('mov_cod').value.toUpperCase();
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const tipo = document.getElementById('mov_tipo').value;
        const ope = document.getElementById('mov_ope').value;

        if(!produtos[cod] || !qtd) return alert("Erro nos dados!");

        const registro = {
            data: new Date().toLocaleString('pt-pt'),
            tipo, cod, 
            prod: produtos[cod].prod, 
            desc: produtos[cod].desc, // Salva a descrição no log
            qtd, ope
        };

        historico.unshift(registro);
        localStorage.setItem('i9_v2_logs', JSON.stringify(historico));
        renderizar();
    }

    function renderizar() {
        const filtro = document.getElementById('inputPesquisa').value.toLowerCase();
        
        // 1. Tabela Saldo
        const corpoSaldo = document.getElementById('corpoSaldo');
        corpoSaldo.innerHTML = '';
        const saldos = {};
        
        historico.forEach(l => {
            if(!saldos[l.cod]) saldos[l.cod] = { prod: l.prod, desc: l.desc, e: 0, s: 0 };
            if(l.tipo === 'ENTRADA') saldos[l.cod].e += l.qtd;
            else saldos[l.cod].s += l.qtd;
        });

        for(let c in saldos) {
            const saldoFinal = saldos[c].e - saldos[c].s;
            if(c.toLowerCase().includes(filtro) || saldos[c].prod.toLowerCase().includes(filtro) || saldos[c].desc.toLowerCase().includes(filtro)) {
                corpoSaldo.innerHTML += `
                    <tr>
                        <td><b>${c}</b></td>
                        <td>${saldos[c].prod}</td>
                        <td style="color:#777">${saldos[c].desc}</td>
                        <td style="font-weight:bold">${saldoFinal}</td>
                        <td><span class="status-pill ${saldoFinal > 0 ? 'bg-ok' : 'bg-zero'}">${saldoFinal > 0 ? 'EM STOCK' : 'ESGOTADO'}</span></td>
                    </tr>`;
            }
        }

        // 2. Tabela Histórico
        const corpoHist = document.getElementById('corpoHist');
        corpoHist.innerHTML = '';
        historico.filter(l => l.cod.toLowerCase().includes(filtro) || l.prod.toLowerCase().includes(filtro)).slice(0, 10).forEach(l => {
            corpoHist.innerHTML += `
                <tr>
                    <td>${l.data}</td>
                    <td style="color:${l.tipo === 'ENTRADA' ? 'green' : 'orange'}"><b>${l.tipo}</b></td>
                    <td>${l.cod}</td>
                    <td>${l.prod} <br><small style="color:#999">${l.desc}</small></td>
                    <td>${l.qtd}</td>
                    <td>${l.ope}</td>
                </tr>`;
        });
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    renderizar();
</script>
</body>
</html>
