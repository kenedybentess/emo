<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Injeção (Com Busca Automática)</title>
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --info: #3498db; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); font-size: 12px; }
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
        .container { width: 98%; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Seções */
        .section { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .section-title { font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 3px; }

        /* Formulários */
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; margin-bottom: 3px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        input:read-only { background: #f0f0f0; color: #777; }

        /* Botões */
        button { cursor: pointer; padding: 10px; border: none; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add-db { background: var(--info); }
        .btn-reg-mov { background: var(--entry); width: 100%; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #eee; padding: 8px; text-align: left; border-bottom: 2px solid #ccc; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .badge-saida { color: var(--exit); font-weight: bold; }
        .badge-entrada { color: var(--entry); font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold;">I9 INJEÇÃO - SISTEMA COM BUSCA AUTOMÁTICA (PROCV)</div>
    <div id="relogio"></div>
</div>

<div class="container">
    
    <div class="section" style="background: #eef7ff;">
        <div class="section-title">📂 1. CADASTRAR NOVO PRODUTO NO BANCO DE DADOS</div>
        <div class="grid-form">
            <div class="form-group"><label>CÓDIGO</label><input type="text" id="db_cod" placeholder="Ex: 1010"></div>
            <div class="form-group"><label>NOME DO PRODUTO</label><input type="text" id="db_prod" placeholder="Ex: Tampa"></div>
            <div class="form-group"><label>DESCRIÇÃO</label><input type="text" id="db_desc" placeholder="Ex: Tampa PP Azul"></div>
            <div class="form-group" style="justify-content: flex-end;">
                <button class="btn-add-db" onclick="salvarNoBanco()">💾 SALVAR NO BANCO</button>
            </div>
        </div>
        <small style="color: #666;">* Registre aqui uma vez para que o sistema reconheça o código automaticamente depois.</small>
    </div>

    <div class="section">
        <div class="section-title">🚀 2. REGISTRAR ENTRADA OU SAÍDA</div>
        <div class="grid-form">
            <div class="form-group">
                <label>OPERAÇÃO</label>
                <select id="tipoMov">
                    <option value="ENTRADA">➕ ENTRADA (Produção)</option>
                    <option value="SAIDA">➖ SAÍDA (Expedição)</option>
                </select>
            </div>
            <div class="form-group">
                <label>DIGITE O CÓDIGO</label>
                <input type="text" id="mov_cod" oninput="buscarProcv(this.value)" placeholder="Digite e veja a mágica...">
            </div>
            <div class="form-group"><label>PRODUTO (Automático)</label><input type="text" id="mov_prod" readonly></div>
            <div class="form-group"><label>DESCRIÇÃO (Automático)</label><input type="text" id="mov_desc" readonly></div>
            <div class="form-group"><label>QUANTIDADE</label><input type="number" id="mov_qtd"></div>
            <div class="form-group"><label>OPERADOR</label><input type="text" id="mov_ope"></div>
        </div>
        <button class="btn-reg-mov" onclick="registrarMovimentacao()">FINALIZAR REGISTRO</button>
    </div>

    <div class="section">
        <div class="section-title">📊 SALDO ATUAL E ÚLTIMOS LANÇAMENTOS</div>
        <table id="tabelaHist">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>TIPO</th>
                    <th>CÓDIGO</th>
                    <th>PRODUTO</th>
                    <th>QTD</th>
                    <th>OPERADOR</th>
                </tr>
            </thead>
            <tbody id="corpoHist"></tbody>
        </table>
    </div>
</div>

<script>
    // Banco de dados de produtos (Cadastro Mestre)
    let bancoProdutos = JSON.parse(localStorage.getItem('i9_banco_produtos')) || {};
    // Histórico de Movimentações
    let movimentacoes = JSON.parse(localStorage.getItem('i9_movimentacoes')) || [];

    // FUNÇÃO PARA SALVAR NO BANCO (O "PROCV" VAI BUSCAR DAQUI)
    function salvarNoBanco() {
        const cod = document.getElementById('db_cod').value.trim().toUpperCase();
        const prod = document.getElementById('db_prod').value.trim();
        const desc = document.getElementById('db_desc').value.trim();

        if(!cod || !prod) return alert("Código e Produto são obrigatórios para o cadastro!");

        bancoProdutos[cod] = { produto: prod, descricao: desc };
        localStorage.setItem('i9_banco_produtos', JSON.stringify(bancoProdutos));
        
        alert("Produto " + cod + " cadastrado com sucesso!");
        document.getElementById('db_cod').value = "";
        document.getElementById('db_prod').value = "";
        document.getElementById('db_desc').value = "";
    }

    // FUNÇÃO PROCV (BUSCA AUTOMÁTICA)
    function buscarProcv(codigo) {
        codigo = codigo.toUpperCase().trim();
        const prodCampo = document.getElementById('mov_prod');
        const descCampo = document.getElementById('mov_desc');

        if(bancoProdutos[codigo]) {
            prodCampo.value = bancoProdutos[codigo].produto;
            descCampo.value = bancoProdutos[codigo].descricao;
            prodCampo.style.background = "#d4edda"; // Verde se achou
        } else {
            prodCampo.value = "NÃO CADASTRADO";
            descCampo.value = "Vá na seção 1 e cadastre";
            prodCampo.style.background = "#f8d7da"; // Vermelho se não achou
        }
    }

    // REGISTRAR A MOVIMENTAÇÃO
    function registrarMovimentacao() {
        const cod = document.getElementById('mov_cod').value.toUpperCase();
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const tipo = document.getElementById('tipoMov').value;
        const ope = document.getElementById('mov_ope').value;

        if(!bancoProdutos[cod]) return alert("Erro: Este código não existe no banco de dados!");
        if(!qtd) return alert("Digite a quantidade!");

        const novaMov = {
            data: new Date().toLocaleString('pt-BR'),
            tipo: tipo,
            cod: cod,
            prod: bancoProdutos[cod].produto,
            qtd: qtd,
            operador: ope
        };

        movimentacoes.unshift(novaMov);
        localStorage.setItem('i9_movimentacoes', JSON.stringify(movimentacoes));
        
        // Limpar campos
        document.getElementById('mov_cod').value = "";
        document.getElementById('mov_qtd').value = "";
        document.getElementById('mov_prod').value = "";
        document.getElementById('mov_desc').value = "";
        document.getElementById('mov_prod').style.background = "";
        
        renderizar();
    }

    function renderizar() {
        const corpo = document.getElementById('corpoHist');
        corpo.innerHTML = '';
        movimentacoes.slice(0, 15).forEach(m => {
            corpo.innerHTML += `
                <tr>
                    <td>${m.data}</td>
                    <td class="${m.tipo === 'ENTRADA' ? 'badge-entrada' : 'badge-saida'}">${m.tipo}</td>
                    <td>${m.cod}</td>
                    <td>${m.prod}</td>
                    <td><b>${m.tipo === 'SAIDA' ? '-' : '+'}${m.qtd}</b></td>
                    <td>${m.operador}</td>
                </tr>`;
        });
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    renderizar();
</script>
</body>
</html>
