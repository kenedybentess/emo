<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Entrada via Ordem)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; 
            --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        #main-content { display: none; }

        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { cursor: pointer; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-reg { background: var(--primary); width: 100%; margin-top: 10px; }
        .btn-history { background: white; color: var(--primary); width: 100%; padding: 12px; font-size: 13px; margin-bottom: 20px; border: 2px solid var(--primary); }
        
        .txt-entry { color: var(--entry); font-weight: bold; } 
        .txt-exit { color: var(--exit); font-weight: bold; }  
        .txt-order { color: var(--done); font-weight: bold; } 
        
        #modal-historico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; width: 95%; margin: 30px auto; padding: 25px; border-radius: 8px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: var(--danger); }
        .stock-baixo td { color: var(--danger); font-weight: bold; background-color: #fff5f5; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width:100%" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <button class="btn-history" onclick="abrirHistorico()">🕒 HISTÓRICO & EXPORTAR</button>

        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 style="color: var(--danger)">📂 CONFIGURAÇÕES ADMIN</h3>
                <select id="admin_modo" onchange="alternarFormAdmin()">
                    <option value="PROD">CADASTRO DE PRODUTOS</option>
                    <option value="ORDEM">ORDENS DE TRABALHO (OF)</option>
                </select>
                <div id="form-prod">
                    <label>Código</label><input type="text" id="cad_cod">
                    <label>Produto</label><input type="text" id="cad_prod">
                    <label>Descrição</label><input type="text" id="cad_desc">
                    <label>Mínimo</label><input type="number" id="cad_min" value="5">
                    <button class="btn-reg" onclick="salvarProduto()">GUARDAR ARTIGO</button>
                </div>
                <div id="form-ordem" style="display:none">
                    <label>Nº Ordem</label><input type="text" id="ord_id">
                    <label>Cód. Artigo</label><input type="text" id="ord_cod" oninput="procv(this.value, 'ord_nome', '')">
                    <input type="text" id="ord_nome" readonly style="color: var(--done); font-weight: bold;">
                    <label>Meta</label><input type="number" id="ord_meta">
                    <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR ORDEM</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--info)">🚀 MOVIMENTAR STOCK</h3>
                <label>Tipo de Operação</label>
                <select id="mov_tipo" onchange="alternarCamposEntrada()">
                    <option value="ENTRADA">ENTRADA (Via Ordem de Trabalho)</option>
                    <option value="SAIDA">SAÍDA (Venda / Desperdício)</option>
                </select>

                <div id="campos-entrada">
                    <label>Selecionar Ordem de Trabalho</label>
                    <select id="mov_ordem_id" onchange="preencherPelaOrdem()"><option value="">Carregando Ordens...</option></select>
                </div>

                <div id="campos-saida" style="display:none">
                    <label>Código do Artigo</label>
                    <input type="text" id="mov_cod" oninput="procv(this.value, 'nome_prod', 'desc_prod')">
                </div>

                <label>Produto Identificado</label>
                <input type="text" id="nome_prod" readonly style="font-weight: bold;">
                <input type="text" id="desc_prod" readonly style="font-size: 11px; color: #666;">
                
                <label>Quantidade</label>
                <input type="number" id="mov_qtd" oninput="validarOF()">
                <span id="msg-validacao"></span>
                
                <button id="btn-registar" class="btn-reg" onclick="lancarMovimento()">CONFIRMAR REGISTO</button>
            </div>
        </div>

        <div class="card">
            <h3>📋 ORDENS E SALDOS</h3>
            <table>
                <thead><tr><th>OF</th><th>CÓDIGO</th><th>PRODUTO</th><th>META</th><th>REAL</th><th>ESTADO</th></tr></thead>
                <tbody id="corpoOrdens"></tbody>
            </table>
        </div>

        <div class="card" style="margin-top:20px">
            <h3>📊 STOCK EM TEMPO REAL</h3>
            <table>
                <thead><tr><th>CÓDIGO</th><th>ARTIGO</th><th>SALDO</th><th>MÍN</th></tr></thead>
                <tbody id="corpoStock"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-historico">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharHistorico()">&times;</span>
        <h2>🕒 REGISTOS TÉCNICOS <button onclick="exportarCSV()" style="background:var(--entry); font-size:11px">DOWNLOAD CSV</button></h2>
        <input type="text" id="pesquisaHist" placeholder="Pesquisar..." onkeyup="renderizarHistorial()">
        <table>
            <thead><tr><th>DATA</th><th>TIPO/OF</th><th>COD</th><th>PRODUTO</th><th>QTD</th><th>USER</th></tr></thead>
            <tbody id="corpoHist"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let produtosGlobal = {};
    let ordensGlobal = {};
    let historicoGlobal = [];

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-display').innerText = res.user.email;
                if(["admin@i9.com", "super@i9.com"].includes(res.user.email)) document.getElementById('panel-admin').style.display = 'block';
                carregarDados();
            }).catch(() => alert("Erro de Login"));
    }

    function carregarDados() {
        db.ref('produtos').on('value', s => { produtosGlobal = s.val() || {}; renderizarTudo(); });
        db.ref('ordens').on('value', s => { 
            ordensGlobal = s.val() || {}; 
            atualizarSelectOrdens(); 
            renderizarTudo(); 
        });
        db.ref('movimentacoes').on('value', s => { 
            historicoGlobal = s.val() ? Object.values(s.val()).reverse() : []; 
            renderizarTudo(); 
            renderizarHistorial();
        });
    }

    function abrirHistorico() { document.getElementById('modal-historico').style.display = 'block'; }
    function fecharHistorico() { document.getElementById('modal-historico').style.display = 'none'; }

    function alternarCamposEntrada() {
        const tipo = document.getElementById('mov_tipo').value;
        document.getElementById('campos-entrada').style.display = (tipo === 'ENTRADA') ? 'block' : 'none';
        document.getElementById('campos-saida').style.display = (tipo === 'SAIDA') ? 'block' : 'none';
        limparFormMov();
    }

    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem_id');
        sel.innerHTML = '<option value="">Selecione a Ordem Ativa...</option>';
        for(let id in ordensGlobal) {
            sel.innerHTML += `<option value="${id}">${id} - ${ordensGlobal[id].prod}</option>`;
        }
    }

    function preencherPelaOrdem() {
        const id = document.getElementById('mov_ordem_id').value;
        if(id && ordensGlobal[id]) {
            const cod = ordensGlobal[id].cod;
            document.getElementById('nome_prod').value = ordensGlobal[id].prod;
            document.getElementById('desc_prod').value = produtosGlobal[cod] ? produtosGlobal[cod].desc : "";
            validarOF();
        }
    }

    function procv(cod, idNome, idDesc) {
        const item = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById(idNome).value = item ? item.prod : "";
        document.getElementById(idDesc).value = item ? (item.desc || "") : "";
    }

    function validarOF() {
        const tipo = document.getElementById('mov_tipo').value;
        if(tipo !== 'ENTRADA') return;
        
        const id = document.getElementById('mov_ordem_id').value;
        const qtd = parseFloat(document.getElementById('mov_qtd').value) || 0;
        const msg = document.getElementById('msg-validacao');
        
        if(id && ordensGlobal[id]) {
            const feito = historicoGlobal.filter(h => h.ordem === id).reduce((a, b) => a + (parseFloat(b.qtd) || 0), 0);
            const falta = ordensGlobal[id].meta - feito;
            
            if(qtd > falta) {
                msg.innerHTML = `<b class="txt-danger">Excesso! Só restam ${falta} unidades nesta OF.</b>`;
                document.getElementById('btn-registar').disabled = true;
            } else {
                msg.innerHTML = `<b class="txt-entry">Saldo da OF: ${falta}</b>`;
                document.getElementById('btn-registar').disabled = false;
            }
        }
    }

    function lancarMovimento() {
        const tipo = document.getElementById('mov_tipo').value;
        const qtd = parseFloat(document.getElementById('mov_qtd').value);
        if(!qtd) return alert("Insira quantidade");

        let d = { 
            data: new Date().toLocaleString('pt-pt'), 
            qtd: qtd, 
            ope: document.getElementById('user-display').innerText 
        };

        if(tipo === 'ENTRADA') {
            const idOF = document.getElementById('mov_ordem_id').value;
            if(!idOF) return alert("Selecione a OF");
            d.tipo = "ORDEM";
            d.ordem = idOF;
            d.cod = ordensGlobal[idOF].cod;
            d.prod = ordensGlobal[idOF].prod;
        } else {
            const cod = document.getElementById('mov_cod').value.toUpperCase().trim();
            if(!produtosGlobal[cod]) return alert("Código inexistente");
            d.tipo = "SAIDA";
            d.cod = cod;
            d.prod = produtosGlobal[cod].prod;
        }

        db.ref('movimentacoes').push(d).then(() => {
            alert("Sucesso!");
            limparFormMov();
        });
    }

    function renderizarTudo() {
        // Stock
        const corpoStock = document.getElementById('corpoStock'); corpoStock.innerHTML = '';
        const saldos = {};
        for(let c in produtosGlobal) saldos[c] = { ...produtosGlobal[c], total: 0 };
        
        historicoGlobal.forEach(h => {
            if(saldos[h.cod]) {
                const q = parseFloat(h.qtd) || 0;
                if(h.tipo === 'ORDEM' || h.tipo === 'ENTRADA') saldos[h.cod].total += q;
                else saldos[h.cod].total -= q;
            }
        });

        for(let c in saldos) {
            corpoStock.innerHTML += `<tr class="${saldos[c].total <= saldos[c].min ? 'stock-baixo' : ''}">
                <td><b>${c}</b></td><td>${saldos[c].prod}</td>
                <td><b>${saldos[c].total}</b></td><td>${saldos[c].min}</td>
            </tr>`;
        }

        // Ordens
        const corpoOrdens = document.getElementById('corpoOrdens'); corpoOrdens.innerHTML = '';
        for(let id in ordensGlobal) {
            const feito = historicoGlobal.filter(h => h.ordem === id).reduce((a, b) => a + (parseFloat(b.qtd) || 0), 0);
            const perc = ((feito/ordensGlobal[id].meta)*100).toFixed(0);
            corpoOrdens.innerHTML += `<tr>
                <td class="txt-order">${id}</td><td>${ordensGlobal[id].cod}</td>
                <td>${ordensGlobal[id].prod}</td><td>${ordensGlobal[id].meta}</td>
                <td class="txt-order">${feito}</td><td>${perc}%</td>
            </tr>`;
        }
    }

    function renderizarHistorial() {
        const f = document.getElementById('pesquisaHist').value.toLowerCase();
        const corpo = document.getElementById('corpoHist'); corpo.innerHTML = '';
        historicoGlobal.filter(h => h.cod.toLowerCase().includes(f) || h.prod.toLowerCase().includes(f)).forEach(h => {
            const cl = h.ordem ? 'txt-order' : 'txt-exit';
            corpo.innerHTML += `<tr><td>${h.data}</td><td class="${cl}">${h.ordem || h.tipo}</td><td>${h.cod}</td><td>${h.prod}</td><td>${h.qtd}</td><td>${h.ope.split('@')[0]}</td></tr>`;
        });
    }

    function limparFormMov() {
        document.getElementById('mov_cod').value = "";
        document.getElementById('mov_qtd').value = "";
        document.getElementById('nome_prod').value = "";
        document.getElementById('desc_prod').value = "";
        document.getElementById('msg-validacao').innerText = "";
        document.getElementById('mov_ordem_id').value = "";
    }

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.toUpperCase().trim();
        const prod = document.getElementById('cad_prod').value;
        const desc = document.getElementById('cad_desc').value;
        const min = parseInt(document.getElementById('cad_min').value) || 0;
        if(cod && prod) db.ref('produtos/'+cod).set({ prod, desc, min });
    }

    function salvarOrdem() {
        const id = document.getElementById('ord_id').value.toUpperCase().trim();
        const cod = document.getElementById('ord_cod').value.toUpperCase().trim();
        const meta = parseInt(document.getElementById('ord_meta').value);
        if(id && produtosGlobal[cod]) db.ref('ordens/'+id).set({ cod, prod: produtosGlobal[cod].prod, meta });
    }

    function alternarFormAdmin() {
        const m = document.getElementById('admin_modo').value;
        document.getElementById('form-prod').style.display = m === 'PROD' ? 'block' : 'none';
        document.getElementById('form-ordem').style.display = m === 'ORDEM' ? 'block' : 'none';
    }

    function exportarCSV() {
        let csv = "\uFEFFData;Tipo;Codigo;Produto;Quantidade;Operador\n";
        historicoGlobal.forEach(h => { csv += `${h.data};${h.ordem || h.tipo};${h.cod};${h.prod};${h.qtd};${h.ope}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `I9_Export.csv`;
        link.click();
    }
</script>
</body>
</html>
