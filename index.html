<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Sistema Consolidado)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; 
            --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        #main-content { display: none; }

        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { cursor: pointer; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-reg { background: var(--primary); width: 100%; margin-top: 10px; }
        .btn-history { background: white; color: var(--primary); width: 100%; padding: 12px; font-size: 13px; margin-bottom: 20px; border: 2px solid var(--primary); }
        .btn-export { background: var(--entry); margin-left: 10px; font-size: 11px; }
        
        /* Cores Dinâmicas */
        .txt-entry { color: var(--entry); font-weight: bold; } /* Verde para Entradas */
        .txt-exit { color: var(--exit); font-weight: bold; }  /* Laranja para Saídas */
        .txt-order { color: var(--done); font-weight: bold; } /* Roxo para Ordens */
        .txt-danger { color: var(--danger); font-weight: bold; }
        
        #modal-historico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; width: 95%; margin: 30px auto; padding: 25px; border-radius: 8px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: var(--danger); }
        
        .stock-baixo td { color: var(--danger); font-weight: bold; background-color: #fff5f5; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width:100%" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <button class="btn-history" onclick="abrirHistorico()">🕒 VER HISTÓRICO & EXPORTAR DADOS</button>

        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 style="color: var(--danger)">📂 CONFIGURAÇÕES ADMIN</h3>
                <select id="admin_modo" onchange="alternarFormAdmin()">
                    <option value="PROD">CADASTRO DE PRODUTOS</option>
                    <option value="ORDEM">ORDENS DE TRABALHO (OF)</option>
                </select>
                <div id="form-prod">
                    <label>Código</label><input type="text" id="cad_cod">
                    <label>Produto</label><input type="text" id="cad_prod">
                    <label>Descrição</label><input type="text" id="cad_desc">
                    <label>Mínimo</label><input type="number" id="cad_min" value="5">
                    <button class="btn-reg" onclick="salvarProduto()">GUARDAR ARTIGO</button>
                </div>
                <div id="form-ordem" style="display:none">
                    <label>Nº Ordem</label><input type="text" id="ord_id">
                    <label>Código Artigo</label><input type="text" id="ord_cod" oninput="procv(this.value, 'ord_nome', '')">
                    <input type="text" id="ord_nome" readonly style="color: var(--done); font-weight: bold;">
                    <label>Meta Planeada</label><input type="number" id="ord_meta">
                    <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR ORDEM</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--info)">🚀 MOVIMENTAR STOCK</h3>
                <select id="mov_modo" onchange="alternarModoMov()">
                    <option value="STOCK">MOVIMENTAÇÃO MANUAL (ENTRADA/SAÍDA)</option>
                    <option value="ORDEM">PRODUÇÃO (ORDEM DE TRABALHO)</option>
                </select>
                <div id="mov-stock-fields">
                    <label>Operação</label>
                    <select id="mov_tipo"><option value="ENTRADA">ENTRADA (+)</option><option value="SAIDA">SAÍDA (-)</option></select>
                    <input type="text" id="mov_cod" placeholder="Código do Artigo" oninput="procv(this.value, 'nome_prod', 'desc_prod')">
                </div>
                <div id="mov-ordem-fields" style="display:none">
                    <label>Selecionar Ordem Ativa</label>
                    <select id="mov_ordem_id" onchange="validarOrdem()"><option value="">Aguardando...</option></select>
                </div>
                <label>Artigo / Descrição</label>
                <input type="text" id="nome_prod" readonly placeholder="Nome">
                <input type="text" id="desc_prod" readonly placeholder="Descrição técnica" style="font-size: 11px;">
                <label>Quantidade</label>
                <input type="number" id="mov_qtd" oninput="validarOrdem()">
                <span id="msg-validacao" style="display:block; margin-bottom:10px;"></span>
                <button id="btn-registar" class="btn-reg" onclick="lancarMovimento()">CONFIRMAR MOVIMENTO</button>
            </div>
        </div>

        <div class="card" style="margin-bottom:20px">
            <h3 style="color: var(--done)">📋 MONITORIZAÇÃO DE ORDENS</h3>
            <table>
                <thead><tr><th>OF</th><th>CÓDIGO</th><th>PRODUTO/DESCRIÇÃO</th><th>META</th><th>REAL</th><th>%</th><th>AÇÕES</th></tr></thead>
                <tbody id="corpoOrdens"></tbody>
            </table>
        </div>

        <div class="card">
            <h3 style="color: var(--primary)">📊 SALDOS EM STOCK</h3>
            <table>
                <thead><tr><th>CÓDIGO</th><th>PRODUTO/DESCRIÇÃO</th><th>SALDO ATUAL</th><th>MÍN</th></tr></thead>
                <tbody id="corpoStock"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-historico">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharHistorico()">&times;</span>
        <h2 style="color: var(--primary)">🕒 HISTÓRICO DETALHADO 
            <button class="btn-export" onclick="exportarCSV()">📥 EXPORTAR PARA EXCEL (CSV)</button>
        </h2>
        <input type="text" id="pesquisaHist" placeholder="Pesquisar no histórico..." onkeyup="renderizarHistorial()">
        <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr><th>DATA/HORA</th><th>TIPO/OF</th><th>CÓDIGO</th><th>PRODUTO</th><th>DESCRIÇÃO</th><th>QTD</th><th>OPERADOR</th></tr>
                </thead>
                <tbody id="corpoHist"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const listaAdmins = ["admin@i9.com", "super@i9.com"];
    const listaSuper = ["super@i9.com"];
    let produtosGlobal = {};
    let ordensGlobal = {};
    let historicoGlobal = [];

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-display').innerText = res.user.email;
                if(listaAdmins.includes(res.user.email)) document.getElementById('panel-admin').style.display = 'block';
                carregarDados();
            }).catch(() => alert("Acesso Negado"));
    }

    function carregarDados() {
        db.ref('produtos').on('value', s => { produtosGlobal = s.val() || {}; renderizarTudo(); });
        db.ref('ordens').on('value', s => { ordensGlobal = s.val() || {}; atualizarSelectOrdens(); renderizarTudo(); });
        db.ref('movimentacoes').on('value', s => { 
            historicoGlobal = s.val() ? Object.values(s.val()).reverse() : []; 
            renderizarTudo(); 
            renderizarHistorial();
        });
    }

    function abrirHistorico() { document.getElementById('modal-historico').style.display = 'block'; }
    function fecharHistorico() { document.getElementById('modal-historico').style.display = 'none'; }

    function procv(cod, idNome, idDesc) {
        const item = produtosGlobal[cod.toUpperCase().trim()];
        if(document.getElementById(idNome)) document.getElementById(idNome).value = item ? item.prod : "";
        if(document.getElementById(idDesc)) document.getElementById(idDesc).value = item ? (item.desc || "") : "";
    }

    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem_id');
        sel.innerHTML = '<option value="">Selecionar...</option>';
        for(let id in ordensGlobal) sel.innerHTML += `<option value="${id}">${id} - ${ordensGlobal[id].prod}</option>`;
    }

    function validarOrdem() {
        const modo = document.getElementById('mov_modo').value;
        if(modo !== 'ORDEM') return;
        const idOrd = document.getElementById('mov_ordem_id').value;
        const qtd = parseInt(document.getElementById('mov_qtd').value) || 0;
        if(idOrd && ordensGlobal[idOrd]) {
            const feito = historicoGlobal.filter(h => h.ordem === idOrd).reduce((a, b) => a + b.qtd, 0);
            const falta = ordensGlobal[idOrd].meta - feito;
            document.getElementById('nome_prod').value = ordensGlobal[idOrd].prod;
            document.getElementById('desc_prod').value = ordensGlobal[idOrd].desc || "";
            const msg = document.getElementById('msg-validacao');
            if(qtd > falta) {
                msg.innerHTML = `<b class="txt-danger">⚠️ Limite Excedido! Saldo OF: ${falta}</b>`;
                document.getElementById('btn-registar').disabled = true;
            } else {
                msg.innerHTML = `<b class="txt-entry">Saldo disponível na OF: ${falta}</b>`;
                document.getElementById('btn-registar').disabled = false;
            }
        }
    }

    function lancarMovimento() {
        const modo = document.getElementById('mov_modo').value;
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const user = document.getElementById('user-display').innerText;
        if(!qtd) return alert("Insira uma quantidade!");

        let d = { data: new Date().toLocaleString('pt-pt'), qtd, ope: user };
        
        if(modo === 'STOCK') {
            const cod = document.getElementById('mov_cod').value.toUpperCase().trim();
            if(!produtosGlobal[cod]) return alert("Artigo não encontrado!");
            d.tipo = document.getElementById('mov_tipo').value;
            d.cod = cod; d.prod = produtosGlobal[cod].prod; d.desc = produtosGlobal[cod].desc || "";
        } else {
            const id = document.getElementById('mov_ordem_id').value;
            if(!id) return alert("Selecione uma OF!");
            d.tipo = "ORDEM"; d.ordem = id;
            d.cod = ordensGlobal[id].cod; d.prod = ordensGlobal[id].prod; d.desc = ordensGlobal[id].desc || "";
        }

        db.ref('movimentacoes').push(d).then(() => {
            alert("Registo Concluído!");
            limparCampos();
        });
    }

    function exportarCSV() {
        let csv = "\uFEFFData;Tipo;Codigo;Produto;Descricao;Quantidade;Operador\n";
        historicoGlobal.forEach(h => {
            csv += `${h.data};${h.ordem || h.tipo};${h.cod};${h.prod};${h.desc || ''};${h.qtd};${h.ope}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `SGE_I9_Export_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function renderizarTudo() {
        const isSuper = listaSuper.includes(document.getElementById('user-display').innerText);
        
        // Stock: Lógica de Soma (ENTRADA + ORDEM somam ao stock)
        const corpoStock = document.getElementById('corpoStock'); corpoStock.innerHTML = '';
        const saldos = {}; for(let c in produtosGlobal) saldos[c] = { ...produtosGlobal[c], e:0, s:0 };
        
        historicoGlobal.forEach(h => { 
            if(saldos[h.cod]) { 
                if(h.tipo === 'ENTRADA' || h.tipo === 'ORDEM') saldos[h.cod].e += h.qtd; 
                else saldos[h.cod].s += h.qtd; 
            } 
        });

        for(let c in saldos) {
            const total = saldos[c].e - saldos[c].s;
            corpoStock.innerHTML += `<tr class="${total <= saldos[c].min ? 'stock-baixo' : ''}">
                <td><b>${c}</b></td><td>${saldos[c].prod}<br><small>${saldos[c].desc || ''}</small></td>
                <td style="font-size:14px"><b>${total}</b></td><td>${saldos[c].min}</td>
            </tr>`;
        }

        // Ordens
        const corpoOrdens = document.getElementById('corpoOrdens'); corpoOrdens.innerHTML = '';
        for(let id in ordensGlobal) {
            const feito = historicoGlobal.filter(h => h.ordem === id).reduce((a, b) => a + b.qtd, 0);
            const perc = ((feito/ordensGlobal[id].meta)*100).toFixed(0);
            corpoOrdens.innerHTML += `<tr>
                <td class="txt-order">${id}</td><td>${ordensGlobal[id].cod}</td>
                <td>${ordensGlobal[id].prod}<br><small>${ordensGlobal[id].desc || ''}</small></td>
                <td>${ordensGlobal[id].meta}</td><td class="txt-order">${feito}</td>
                <td><b style="color:${perc >= 100 ? 'var(--entry)' : 'var(--info)'}">${perc}%</b></td>
                <td>${isSuper ? `<button class="txt-danger" style="background:none; border:1px solid" onclick="eliminarOrdem('${id}')">Eliminar</button>` : '--'}</td>
            </tr>`;
        }
    }

    function renderizarHistorial() {
        const f = document.getElementById('pesquisaHist').value.toLowerCase();
        const corpo = document.getElementById('corpoHist'); corpo.innerHTML = '';
        historicoGlobal.filter(h => h.cod.toLowerCase().includes(f) || h.prod.toLowerCase().includes(f) || (h.ordem && h.ordem.toLowerCase().includes(f)))
        .forEach(h => {
            const cl = h.ordem ? 'txt-order' : (h.tipo === 'ENTRADA' ? 'txt-entry' : 'txt-exit');
            corpo.innerHTML += `<tr>
                <td style="font-size:10px">${h.data}</td><td class="${cl}">${h.ordem || h.tipo}</td>
                <td>${h.cod}</td><td>${h.prod}</td><td>${h.desc || ''}</td>
                <td class="${cl}">${h.qtd}</td><td style="font-size:10px">${h.ope.split('@')[0]}</td>
            </tr>`;
        });
    }

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.toUpperCase().trim();
        const prod = document.getElementById('cad_prod').value;
        const desc = document.getElementById('cad_desc').value;
        const min = parseInt(document.getElementById('cad_min').value) || 0;
        if(cod && prod) db.ref('produtos/'+cod).set({ prod, desc, min });
    }

    function salvarOrdem() {
        const id = document.getElementById('ord_id').value.toUpperCase().trim();
        const cod = document.getElementById('ord_cod').value.toUpperCase().trim();
        const meta = parseInt(document.getElementById('ord_meta').value);
        if(id && produtosGlobal[cod]) db.ref('ordens/'+id).set({ cod, prod: produtosGlobal[cod].prod, desc: produtosGlobal[cod].desc || "", meta });
    }

    function eliminarOrdem(id) { if(confirm("Confirmar exclusão da OF?")) db.ref('ordens/'+id).remove(); }
    function alternarFormAdmin() {
        const m = document.getElementById('admin_modo').value;
        document.getElementById('form-prod').style.display = m === 'PROD' ? 'block' : 'none';
        document.getElementById('form-ordem').style.display = m === 'ORDEM' ? 'block' : 'none';
    }
    function alternarModoMov() {
        const m = document.getElementById('mov_modo').value;
        document.getElementById('mov-stock-fields').style.display = m === 'STOCK' ? 'block' : 'none';
        document.getElementById('mov-ordem-fields').style.display = m === 'ORDEM' ? 'block' : 'none';
        limparCampos();
    }
    function limparCampos() {
        document.getElementById('mov_cod').value = ""; document.getElementById('mov_qtd').value = "";
        document.getElementById('nome_prod').value = ""; document.getElementById('desc_prod').value = "";
        document.getElementById('msg-validacao').innerText = "";
    }
</script>
</body>
</html>
