<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Ajuste de Saldo)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; 
            --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; --edit: #f1c40f;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        #main-content { display: none; }
        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; }
        .btn-reg { background: var(--primary); width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); font-size: 9px; padding: 4px 6px; }
        .btn-edit { background: var(--edit); color: #333; font-size: 9px; padding: 4px 6px; margin-right: 2px; }
        .btn-adj { background: #34495e; font-size: 9px; padding: 4px 6px; margin-right: 2px; } /* Botão de Ajuste */
        .super-only { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width:100%" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 id="titulo-admin" style="color: var(--danger)">📂 CADASTRO E EDIÇÃO</h3>
                <select id="admin_modo" onchange="alternarFormAdmin()">
                    <option value="PROD">ARTIGOS / PRODUTOS</option>
                    <option value="ORDEM">ORDENS DE FABRICO (OF)</option>
                </select>
                <div id="form-prod">
                    <label>Código</label><input type="text" id="cad_cod">
                    <label>Nome do Produto</label><input type="text" id="cad_prod">
                    <label>Descrição Técnica</label><input type="text" id="cad_desc">
                    <label>Stock Mínimo</label><input type="number" id="cad_min" value="5">
                    <button class="btn-reg" onclick="salvarProduto()">GUARDAR DADOS</button>
                </div>
                <div id="form-ordem" style="display:none">
                    <label>Nº OF</label><input type="text" id="ord_id">
                    <label>Cód. Artigo</label><input type="text" id="ord_cod" oninput="procv(this.value, 'ord_nome', '')">
                    <input type="text" id="ord_nome" readonly style="color: var(--done); font-weight: bold;">
                    <label>Meta (Qtd)</label><input type="number" id="ord_meta">
                    <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR/EDITAR OF</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--info)">🚀 MOVIMENTAÇÃO RÁPIDA</h3>
                <select id="mov_tipo" onchange="alternarCamposEntrada()">
                    <option value="ENTRADA">ENTRADA (Via OF)</option>
                    <option value="SAIDA">SAÍDA (Expedição)</option>
                </select>
                <div id="campos-entrada">
                    <label>Escolher OF</label>
                    <select id="mov_ordem_id" onchange="preencherPelaOrdem()"><option value="">A carregar...</option></select>
                </div>
                <div id="campos-saida" style="display:none">
                    <label>Código Artigo</label>
                    <input type="text" id="mov_cod" oninput="procv(this.value, 'nome_prod', 'desc_prod')">
                </div>
                <input type="text" id="nome_prod" readonly placeholder="Produto">
                <input type="text" id="desc_prod" readonly style="font-size: 11px; color: #666;" placeholder="Descrição">
                <input type="number" id="mov_qtd" placeholder="Qtd">
                <button class="btn-reg" onclick="lancarMovimento()">REGISTAR</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 STOCK ATUAL EM TEMPO REAL</h3>
            <table>
                <thead>
                    <tr>
                        <th>CÓDIGO</th>
                        <th>ARTIGO / DESCRIÇÃO</th>
                        <th>SALDO ATUAL</th>
                        <th>MÍN</th>
                        <th class="super-only">ADMIN</th>
                    </tr>
                </thead>
                <tbody id="corpoStock"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configurações do Firebase (mesmas do seu projeto)
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let userEmail = "";
    let produtosGlobal = {};
    let movsGlobal = {};
    let ordensGlobal = {};

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => {
                userEmail = res.user.email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-display').innerText = userEmail;
                if(userEmail === "admin@i9.com" || userEmail === "super@i9.com") document.getElementById('panel-admin').style.display = 'block';
                if(userEmail === "super@i9.com") {
                    const css = document.createElement("style");
                    css.innerHTML = ".super-only { display: table-cell !important; }";
                    document.head.appendChild(css);
                }
                carregarDados();
            }).catch(() => alert("Erro no Login"));
    }

    function carregarDados() {
        db.ref('produtos').on('value', s => { produtosGlobal = s.val() || {}; renderizarStock(); });
        db.ref('ordens').on('value', s => { ordensGlobal = s.val() || {}; atualizarSelectOrdens(); });
        db.ref('movimentacoes').on('value', s => { movsGlobal = s.val() || {}; renderizarStock(); });
    }

    // --- FUNÇÃO DE AJUSTE DIRETO DE SALDO ---
    function ajustarSaldoDireto(cod, saldoAtual) {
        const novoSaldo = prompt(`Ajuste Manual de Stock para [${cod}]:\nSaldo atual calculado: ${saldoAtual}\n\nIntroduza o NOVO SALDO desejado:`, saldoAtual);
        
        if (novoSaldo !== null && novoSaldo !== "" && !isNaN(novoSaldo)) {
            const diff = parseFloat(novoSaldo) - saldoAtual;
            if (diff === 0) return;

            const tipoAjuste = diff > 0 ? "ENTRADA" : "SAIDA";
            const qtdAjuste = Math.abs(diff);

            const confirmacao = confirm(`Isto irá gerar um lançamento automático de ${tipoAjuste} de ${qtdAjuste} unidades para corrigir o stock.\nConfirmar?`);
            
            if (confirmacao) {
                const dadosAjuste = {
                    data: new Date().toLocaleString('pt-pt'),
                    tipo: "AJUSTE_SUPER",
                    cod: cod,
                    prod: produtosGlobal[cod].prod,
                    desc: produtosGlobal[cod].desc || "",
                    qtd: qtdAjuste,
                    ope: "SUPER_USER:" + userEmail,
                    direcao: diff > 0 ? "SOMA" : "SUBTRAI" // Helper para o cálculo
                };

                // No sistema original, usamos 'tipo' para decidir se soma ou subtrai.
                // Para o Ajuste, vamos forçar o comportamento:
                if (diff < 0) {
                    dadosAjuste.tipo = "SAIDA"; // Força subtração no cálculo global
                } else {
                    dadosAjuste.tipo = "ENTRADA"; // Força soma no cálculo global
                }

                db.ref('movimentacoes').push(dadosAjuste).then(() => alert("Saldo atualizado com sucesso!"));
            }
        }
    }

    function renderizarStock() {
        const corpoStock = document.getElementById('corpoStock'); 
        corpoStock.innerHTML = '';
        const saldos = {};
        
        for(let c in produtosGlobal) saldos[c] = { ...produtosGlobal[c], total: 0 };
        
        Object.values(movsGlobal).forEach(h => {
            if(saldos[h.cod]) {
                const q = parseFloat(h.qtd) || 0;
                if(h.tipo === 'ORDEM' || h.tipo === 'ENTRADA') saldos[h.cod].total += q;
                else saldos[h.cod].total -= q;
            }
        });

        for(let c in saldos) {
            corpoStock.innerHTML += `<tr>
                <td><b>${c}</b></td>
                <td>${saldos[c].prod}<br><small>${saldos[c].desc || ''}</small></td>
                <td><b style="font-size:14px; color:var(--primary)">${saldos[c].total}</b></td>
                <td>${saldos[c].min}</td>
                <td class="super-only">
                    <button class="btn-adj" onclick="ajustarSaldoDireto('${c}', ${saldos[c].total})">AJUSTAR SALDO</button>
                    <button class="btn-edit" onclick="editarProduto('${c}')">EDIT</button>
                </td>
            </tr>`;
        }
    }

    // Funções auxiliares (mesmas das versões anteriores)
    function alternarFormAdmin() {
        const m = document.getElementById('admin_modo').value;
        document.getElementById('form-prod').style.display = m === 'PROD' ? 'block' : 'none';
        document.getElementById('form-ordem').style.display = m === 'ORDEM' ? 'block' : 'none';
    }
    function editarProduto(id) {
        const p = produtosGlobal[id];
        document.getElementById('admin_modo').value = 'PROD';
        alternarFormAdmin();
        document.getElementById('cad_cod').value = id;
        document.getElementById('cad_prod').value = p.prod;
        document.getElementById('cad_desc').value = p.desc || "";
        document.getElementById('cad_min').value = p.min;
        window.scrollTo(0, 0);
    }
    function salvarProduto() {
        const c = document.getElementById('cad_cod').value.toUpperCase().trim();
        const p = document.getElementById('cad_prod').value;
        const d = document.getElementById('cad_desc').value;
        const m = parseInt(document.getElementById('cad_min').value) || 0;
        if(c && p) db.ref('produtos/'+c).set({ prod: p, desc: d, min: m }).then(() => alert("Dados Guardados!"));
    }
    function alternarCamposEntrada() {
        const t = document.getElementById('mov_tipo').value;
        document.getElementById('campos-entrada').style.display = t === 'ENTRADA' ? 'block' : 'none';
        document.getElementById('campos-saida').style.display = t === 'SAIDA' ? 'block' : 'none';
    }
    function procv(cod, n, d) {
        const i = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById(n).value = i ? i.prod : "";
        if(d) document.getElementById(d).value = i ? (i.desc || "") : "";
    }
    function preencherPelaOrdem() {
        const id = document.getElementById('mov_ordem_id').value;
        if(id && ordensGlobal[id]) {
            document.getElementById('nome_prod').value = ordensGlobal[id].prod;
            document.getElementById('desc_prod').value = produtosGlobal[ordensGlobal[id].cod]?.desc || "";
        }
    }
    function lancarMovimento() {
        const t = document.getElementById('mov_tipo').value;
        const q = parseFloat(document.getElementById('mov_qtd').value);
        if(!q) return;
        let d = { data: new Date().toLocaleString('pt-pt'), qtd: q, ope: userEmail };
        if(t === 'ENTRADA') {
            const id = document.getElementById('mov_ordem_id').value;
            d.tipo = "ORDEM"; d.ordem = id; d.cod = ordensGlobal[id].cod; d.prod = ordensGlobal[id].prod;
        } else {
            const c = document.getElementById('mov_cod').value.toUpperCase().trim();
            d.tipo = "SAIDA"; d.cod = c; d.prod = produtosGlobal[c].prod;
        }
        db.ref('movimentacoes').push(d).then(() => { document.getElementById('mov_qtd').value = ""; alert("Registo OK"); });
    }
    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem_id'); sel.innerHTML = '<option value="">Selecionar OF...</option>';
        for(let id in ordensGlobal) sel.innerHTML += `<option value="${id}">${id}</option>`;
    }
    function salvarOrdem() {
        const i = document.getElementById('ord_id').value.toUpperCase().trim();
        const c = document.getElementById('ord_cod').value.toUpperCase().trim();
        const m = parseInt(document.getElementById('ord_meta').value);
        if(i && produtosGlobal[c]) db.ref('ordens/'+i).set({ cod: c, prod: produtosGlobal[c].prod, meta: m }).then(() => alert("OF Guardada!"));
    }
</script>
</body>
</html>
