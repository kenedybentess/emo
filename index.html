<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD OPs - I9 Industrial v3.7</title>

    <!-- Firebase SDKs Legados (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
            --text-secondary: #94a3b8;
            --primary: #38bdf8; 
            --success: #4ade80; 
            --warning: #fbbf24; 
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }
        .header h1 span { color: var(--primary); font-size: 16px; font-weight: normal; color: var(--text-secondary); }
        
        .live-indicator {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        
        .pulse {
            width: 8px; height: 8px; background: var(--success); border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        /* Indicadores Principais (KPIs) */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .kpi-card span { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; }
        .kpi-card h2 { margin: 10px 0 0 0; font-size: 36px; color: var(--text); }

        /* Grid de Cards */
        .ops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .op-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .op-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .op-id { font-size: 18px; font-weight: bold; color: var(--primary); }
        .op-date { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        
        .product-title { font-size: 16px; font-weight: bold; margin: 0 0 6px 0; color: #ffffff; }
        .product-code { font-size: 11px; color: var(--text-secondary); background: #0f172a; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 15px; font-family: monospace; }

        /* Barras de Progresso */
        .progress-container { margin-top: auto; }
        .progress-bar-bg { background: #0f172a; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; border: 1px solid #1e293b; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.6s ease-out; }
        
        .progress-details { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; }
        
        .badge-done { background: rgba(74, 222, 128, 0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-pending { background: rgba(251, 191, 36, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .status-tag { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE GESTÃO - I9 INDUSTRIAL <span>v3.7 // Painel de Monitoramento</span></h1>
        <div class="live-indicator"><div class="pulse"></div> ATUALIZANDO EM TEMPO REAL</div>
    </div>

    <!-- Bloco de Resumos Técnicos (KPIs) -->
    <div class="kpi-container">
        <div class="kpi-card">
            <span>Ordens de Produção Ativas</span>
            <h2 id="kpi-total-ops">0</h2>
        </div>
        <div class="kpi-card">
            <span>Volume Total Pendente</span>
            <h2 id="kpi-falta-total" style="color: var(--warning);">0</h2>
        </div>
        <div class="kpi-card">
            <span>Eficiência da Planta</span>
            <h2 id="kpi-eficiencia-media" style="color: var(--success);">0%</h2>
        </div>
    </div>

    <!-- Grid OPs -->
    <div class="ops-grid" id="container-ops-cards"></div>

<script>
    // Configurações do Banco de Dados vinculadas ao projeto v3.7
    const firebaseConfig = {
        apiKey: "AIzaSyE_EXEMPLO_CHAVE_V37_AUTENTICA",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };
    
    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dadosOrdens = {};
    let dadosMovimentacoes = {};

    // Sincronização em tempo real das tabelas estruturais do sistema v3.7
    db.ref('ordens').on('value', snapshot => {
        dadosOrdens = snapshot.val() || {};
        renderizarDashboard();
    });

    db.ref('movimentacoes').on('value', snapshot => {
        dadosMovimentacoes = snapshot.val() || {};
        renderizarDashboard();
    });

    function renderizarDashboard() {
        const grid = document.getElementById('container-ops-cards');
        grid.innerHTML = '';

        const listaMovimentacoes = Object.values(dadosMovimentacoes);
        const totalOps = Object.keys(dadosOrdens).length;
        
        let volumePendenteGlobal = 0;
        let acumuloPercentuais = 0;

        // Classifica as OPs por data de criação descrescente (Mais recentes aparecem primeiro)
        const ordensOrdenadas = Object.entries(dadosOrdens).sort((a, b) => {
            return (b[1].criadaEm || '').localeCompare(a[1].criadaEm || '');
        });

        if (totalOps === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 50px; font-size: 14px;">Nenhuma Ordem de Produção localizada na base de dados.</div>`;
            document.getElementById('kpi-total-ops').innerText = "0";
            document.getElementById('kpi-falta-total').innerText = "0";
            document.getElementById('kpi-eficiencia-media').innerText = "0%";
            return;
        }

        ordensOrdenadas.forEach(([idOP, op]) => {
            // Consolida a quantidade que já passou pelo controle de saída/movimentação vinculada a esta OP
            const quantidadeRealizada = listaMovimentacoes
                .filter(m => m.ordem === idOP)
                .reduce((total, m) => total + parseFloat(m.qtd || 0), 0);

            const metaDefinida = parseFloat(op.meta) || 0;
            const saldoRestante = Math.max(0, metaDefinida - quantidadeRealizada);
            const percentualProgresso = metaDefinida > 0 ? Math.min(100, ((quantidadeRealizada / metaDefinida) * 100)) : 0;

            volumePendenteGlobal += saldoRestante;
            acumuloPercentuais += percentualProgresso;

            // Tratamento visual de data/hora de abertura
            let carimboData = "Data não informada";
            if(op.criadaEm) {
                const dataObj = new Date(op.criadaEm);
                carimboData = dataObj.toLocaleDateString('pt-BR') + ' - ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            }

            const opConcluida = saldoRestante === 0;
            const componenteStatus = opConcluida 
                ? `<span class="status-tag badge-done">✔ Finalizada</span>` 
                : `<span class="status-tag badge-pending">Em Execução</span>`;
            
            // Define a cor da barra baseado na entrega
            const corDinamicaBarra = opConcluida ? 'var(--success)' : (percentualProgresso > 60 ? 'var(--primary)' : 'var(--warning)');

            // Criação dinâmica do Card da OP
            grid.innerHTML += `
                <div class="op-card">
                    <div>
                        <div class="op-header">
                            <div>
                                <span class="op-id">${idOP}</span>
                                <div class="op-date">${carimboData}</div>
                            </div>
                            ${componenteStatus}
                        </div>
                        <h3 class="product-title">${op.prod || 'Produto não identificado'}</h3>
                        <span class="product-code">CÓD: ${op.cod || 'S/C'}</span>
                    </div>

                    <div class="progress-container">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percentualProgresso}%; background: ${corDinamicaBarra};"></div>
                        </div>
                        <div class="progress-details">
                            <span style="color: var(--text-secondary)">Qtd: <b>${quantidadeRealizada}</b> / ${metaDefinida}</span>
                            <span style="color: ${opConcluida ? 'var(--success)' : 'var(--text)'}; font-weight: bold;">
                                ${opConcluida ? 'Concluída' : `Falta: ${saldoRestante}`}
                            </span>
                        </div>
                        <div style="text-align: right; margin-top: 4px; font-size: 11px; color: ${corDinamicaBarra}; font-weight: bold;">
                            ${percentualProgresso.toFixed(1)}%
                        </div>
                    </div>
                </div>
            `;
        });

        // Cálculos e alimentação dos painéis superiores de KPI
        const mediaEficienciaGeral = totalOps > 0 ? (acumuloPercentuais / totalOps) : 0;
        
        document.getElementById('kpi-total-ops').innerText = totalOps;
        document.getElementById('kpi-falta-total').innerText = volumePendenteGlobal.toLocaleString('pt-BR');
        document.getElementById('kpi-eficiencia-media').innerText = mediaEficienciaGeral.toFixed(1) + "%";
    }
</script>

</body>
</html>
