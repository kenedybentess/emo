<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Controle por Ordem)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        #main-content { display: none; }

        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input:read-only { background: #f1f2f6; }
        
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; width: 100%; }
        .btn-reg { background: var(--primary); }
        .btn-reg:disabled { background: #ccc; cursor: not-allowed; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; color: white; font-weight: bold; }
        .status-msg { font-weight: bold; font-size: 11px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info)" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white; width: auto;">Sair</button>
    </div>

    <div class="container">
        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--done);">
                <h3>📋 GERAR ORDEM DE TRABALHO</h3>
                <label>Nº da Ordem (Ex: OF-2024-001)</label><input type="text" id="ord_id">
                <label>Produto (Código)</label><input type="text" id="ord_cod" oninput="procvAdmin(this.value)">
                <input type="text" id="ord_nome" readonly placeholder="Nome do Produto">
                <label>Quantidade Planeada (Total)</label><input type="number" id="ord_meta">
                <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR ORDEM</button>
            </div>

            <div class="card">
                <h3>🚀 APONTAMENTO / MOVIMENTAÇÃO</h3>
                <label>Nº da Ordem</label>
                <select id="mov_ordem" onchange="validarLimiteOrdem()"><option value="">Selecione a Ordem...</option></select>
                
                <div id="info-ordem" style="background: #fcf8e3; padding: 10px; border-radius: 5px; margin-bottom: 10px; display:none;">
                    <span id="txt-info-ordem"></span>
                </div>

                <label>Quantidade a Apontar</label>
                <input type="number" id="mov_qtd" oninput="validarLimiteOrdem()">
                
                <span id="msg-erro" class="status-msg" style="color: var(--danger)"></span>
                <button id="btn-registar" class="btn-reg" onclick="lancarMovimento()">REGISTAR APONTAMENTO</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 MONITORIZAÇÃO DE ORDENS</h3>
            <table>
                <thead>
                    <tr><th>ORDEM</th><th>PRODUTO</th><th>PLANEADO</th><th>REALIZADO</th><th>STATUS</th></tr>
                </thead>
                <tbody id="corpoOrdens"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const listaAdmins = ["admin@i9.com", "super@i9.com"]; 
    let produtosGlobal = {};
    let ordensGlobal = {};
    let historicoGlobal = [];

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => configurarInterface(res.user.email))
            .catch(() => alert("Erro de Login"));
    }

    function configurarInterface(email) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-display').innerText = email;
        if (listaAdmins.includes(email)) document.getElementById('panel-admin').style.display = 'block';
        carregarDados();
    }

    function carregarDados() {
        db.ref('produtos').on('value', snap => { produtosGlobal = snap.val() || {}; });
        db.ref('ordens').on('value', snap => { ordensGlobal = snap.val() || {}; atualizarSelectOrdens(); renderizarOrdens(); });
        db.ref('movimentacoes').on('value', snap => {
            const data = snap.val();
            historicoGlobal = data ? Object.values(data) : [];
            renderizarOrdens();
        });
    }

    function procvAdmin(cod) {
        const item = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById('ord_nome').value = item ? item.prod : "Não encontrado";
    }

    function salvarOrdem() {
        const id = document.getElementById('ord_id').value.toUpperCase().trim();
        const cod = document.getElementById('ord_cod').value.toUpperCase().trim();
        const meta = parseInt(document.getElementById('ord_meta').value);
        
        if(!id || !produtosGlobal[cod] || !meta) return alert("Dados incompletos!");
        
        db.ref('ordens/' + id).set({ cod, prod: produtosGlobal[cod].prod, meta }).then(() => {
            alert("Ordem Criada!");
            document.getElementById('ord_id').value = "";
            document.getElementById('ord_cod').value = "";
        });
    }

    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem');
        sel.innerHTML = '<option value="">Selecione a Ordem...</option>';
        for(let id in ordensGlobal) {
            sel.innerHTML += `<option value="${id}">${id} (${ordensGlobal[id].prod})</option>`;
        }
    }

    function validarLimiteOrdem() {
        const idOrdem = document.getElementById('mov_ordem').value;
        const qtdInserida = parseInt(document.getElementById('mov_qtd').value) || 0;
        const btn = document.getElementById('btn-registar');
        const msg = document.getElementById('msg-erro');
        const infoDiv = document.getElementById('info-ordem');
        
        if(!idOrdem) {
            infoDiv.style.display = 'none';
            return;
        }

        const ordem = ordensGlobal[idOrdem];
        const realizado = historicoGlobal.filter(l => l.ordem === idOrdem).reduce((acc, cur) => acc + cur.qtd, 0);
        const restante = ordem.meta - realizado;

        infoDiv.style.display = 'block';
        document.getElementById('txt-info-ordem').innerText = `Saldo disponível para esta Ordem: ${restante}`;

        if (qtdInserida > restante) {
            btn.disabled = true;
            msg.innerText = `⚠️ Limite excedido! Restam apenas ${restante} unidades.`;
        } else if (restante <= 0) {
            btn.disabled = true;
            msg.innerText = `✅ Ordem de trabalho concluída.`;
        } else {
            btn.disabled = false;
            msg.innerText = "";
        }
    }

    function lancarMovimento() {
        const idOrdem = document.getElementById('mov_ordem').value;
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const ope = document.getElementById('user-display').innerText;

        if(!idOrdem || !qtd) return alert("Preencha todos os campos!");

        db.ref('movimentacoes').push({
            data: new Date().toLocaleString('pt-pt'),
            ordem: idOrdem,
            cod: ordensGlobal[idOrdem].cod,
            prod: ordensGlobal[idOrdem].prod,
            qtd: qtd,
            ope: ope
        }).then(() => {
            document.getElementById('mov_qtd').value = "";
            alert("Apontamento realizado!");
        });
    }

    function renderizarOrdens() {
        const corpo = document.getElementById('corpoOrdens');
        corpo.innerHTML = '';

        for(let id in ordensGlobal) {
            const realizado = historicoGlobal.filter(l => l.ordem === id).reduce((acc, cur) => acc + cur.qtd, 0);
            const meta = ordensGlobal[id].meta;
            const percent = Math.min((realizado / meta) * 100, 100).toFixed(0);
            
            corpo.innerHTML += `
                <tr>
                    <td><b>${id}</b></td>
                    <td>${ordensGlobal[id].prod}</td>
                    <td>${meta}</td>
                    <td>${realizado}</td>
                    <td>
                        <span class="badge" style="background:${realizado >= meta ? 'var(--entry)' : 'var(--info)'}">
                            ${percent}% ${realizado >= meta ? '(CONCLUÍDA)' : ''}
                        </span>
                    </td>
                </tr>`;
        }
    }
</script>
</body>
</html>
