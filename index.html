<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGE - Status e Fluxo I9</title>
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); font-size: 13px; }
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
        .container { width: 98%; margin: 15px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Layout de Registro */
        .panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #eee; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .panel.saida-ativa { border: 2px solid var(--exit); background: #fff5eb; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; margin-bottom: 3px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btns { margin-bottom: 20px; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; }
        .btn-confirm { background: var(--primary); flex-grow: 1; }

        /* Estilo das Tabelas */
        .section-title { background: var(--secondary); color: var(--primary); padding: 5px; border-left: 5px solid var(--primary); margin: 20px 0 10px 0; font-weight: bold; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        th { background: #dee2e6; color: #333; padding: 10px; text-align: left; border-bottom: 2px solid #ccc; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; }
        .saldo-positivo { color: var(--entry); font-weight: bold; font-size: 15px; }
        .saldo-alerta { color: var(--danger); font-weight: bold; animation: piscar 1s infinite; }
        
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold;">SISTEMA I9 - CONTROLO E STATUS DE PEÇAS</div>
    <div id="relogio"></div>
</div>

<div class="container">
    <div class="panel" id="painelCampos">
        <div class="form-group">
            <label>OPERAÇÃO</label>
            <select id="tipoMov" onchange="ajustarModo()">
                <option value="ENTRADA">➕ ENTRADA</option>
                <option value="SAIDA">➖ SAÍDA RÁPIDA</option>
            </select>
        </div>
        <div class="form-group"><label>CÓDIGO DA PEÇA</label><input type="text" id="cod"></div>
        <div class="form-group"><label>QUANTIDADE</label><input type="number" id="qtd"></div>
        <div class="form-group"><label>DESCRIÇÃO</label><input type="text" id="desc" class="opcional"></div>
        <div class="form-group"><label>OPERADOR</label><input type="text" id="operador" class="opcional"></div>
    </div>

    <div class="btns">
        <button id="btnAcao" class="btn-confirm" onclick="registrar()">REGISTRAR MOVIMENTAÇÃO</button>
        <button onclick="exportar()" style="background: #217346;">📥 EXPORTAR HISTÓRICO</button>
    </div>

    <div class="section-title">📊 STATUS ATUAL DO ESTOQUE (SALDO CONSOLIDADO)</div>
    <table id="tabelaStatus">
        <thead>
            <tr>
                <th>CÓDIGO DA PEÇA</th>
                <th>DESCRIÇÃO</th>
                <th>TOTAL ENTRADAS</th>
                <th>TOTAL SAÍDAS</th>
                <th>SALDO EM STOCK</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="corpoStatus"></tbody>
    </table>

    <div class="section-title">🕒 ÚLTIMAS MOVIMENTAÇÕES</div>
    <input type="text" id="busca" placeholder="🔍 Filtrar histórico..." onkeyup="filtrar()" style="width:100%; padding:8px; margin-bottom:10px;">
    <table>
        <thead>
            <tr>
                <th>DATA/HORA</th>
                <th>TIPO</th>
                <th>CÓDIGO</th>
                <th>QTD</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoHistorico"></tbody>
    </table>
</div>

<script>
    let historico = JSON.parse(localStorage.getItem('historico_i9_status')) || [];

    function ajustarModo() {
        const tipo = document.getElementById('tipoMov').value;
        const opcionais = document.querySelectorAll('.opcional');
        const painel = document.getElementById('painelCampos');
        
        if (tipo === 'SAIDA') {
            opcionais.forEach(el => { el.disabled = true; el.style.opacity = "0.5"; });
            painel.classList.add('saida-ativa');
        } else {
            opcionais.forEach(el => { el.disabled = false; el.style.opacity = "1"; });
            painel.classList.remove('saida-ativa');
        }
    }

    function registrar() {
        const tipo = document.getElementById('tipoMov').value;
        const cod = document.getElementById('cod').value.trim().toUpperCase();
        const qtd = parseInt(document.getElementById('qtd').value);
        const desc = document.getElementById('desc').value || "Peça S/ Descrição";

        if(!cod || isNaN(qtd)) return alert("Código e Quantidade são obrigatórios!");

        const mov = {
            data: new Date().toLocaleString('pt-BR'),
            tipo: tipo,
            cod: cod,
            desc: desc,
            qtd: qtd,
            id: Date.now()
        };

        historico.unshift(mov);
        localStorage.setItem('historico_i9_status', JSON.stringify(historico));
        
        document.getElementById('cod').value = "";
        document.getElementById('qtd').value = "";
        document.getElementById('cod').focus();
        
        atualizarTabelas();
    }

    function atualizarTabelas() {
        renderizarHistorico();
        renderizarStatus();
    }

    function renderizarStatus() {
        const corpo = document.getElementById('corpoStatus');
        corpo.innerHTML = '';
        
        // Agrupar dados por código
        const status = {};
        historico.forEach(m => {
            if (!status[m.cod]) {
                status[m.cod] = { desc: m.desc, entradas: 0, saidas: 0 };
            }
            if (m.tipo === 'ENTRADA') status[m.cod].entradas += m.qtd;
            else status[m.cod].saidas += m.qtd;
        });

        // Criar linhas da tabela de saldo
        for (let cod in status) {
            const saldo = status[cod].entradas - status[cod].saidas;
            const classeSaldo = saldo <= 5 ? 'saldo-alerta' : 'saldo-positivo';
            
            corpo.innerHTML += `
                <tr>
                    <td><b>${cod}</b></td>
                    <td>${status[cod].desc}</td>
                    <td>${status[cod].entradas}</td>
                    <td>${status[cod].saidas}</td>
                    <td class="${classeSaldo}">${saldo}</td>
                    <td>${saldo <= 0 ? '<span class="status-badge" style="background:var(--danger)">ESGOTADO</span>' : 
                          saldo <= 10 ? '<span class="status-badge" style="background:var(--exit)">CRÍTICO</span>' : 
                          '<span class="status-badge" style="background:var(--entry)">DISPONÍVEL</span>'}</td>
                </tr>`;
        }
    }

    function renderizarHistorico() {
        const corpo = document.getElementById('corpoHistorico');
        corpo.innerHTML = '';
        historico.slice(0, 10).forEach(m => { // Mostra apenas os 10 últimos para não poluir
            corpo.innerHTML += `
                <tr>
                    <td>${m.data}</td>
                    <td style="color:${m.tipo === 'ENTRADA' ? 'var(--entry)' : 'var(--exit)'}; font-weight:bold;">${m.tipo}</td>
                    <td>${m.cod}</td>
                    <td>${m.tipo === 'SAIDA' ? '-' : '+'}${m.qtd}</td>
                    <td><button onclick="excluir(${m.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
                </tr>`;
        });
    }

    function excluir(id) {
        if(confirm("Excluir este registro?")) {
            historico = historico.filter(m => m.id !== id);
            localStorage.setItem('historico_i9_status', JSON.stringify(historico));
            atualizarTabelas();
        }
    }

    function exportar() {
        let csv = '\uFEFFDATA;TIPO;CODIGO;QTD;DESCRICAO\n';
        historico.forEach(m => { csv += `${m.data};${m.tipo};${m.cod};${m.qtd};${m.desc}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Status_Estoque_I9.csv";
        link.click();
    }

    function filtrar() {
        const t = document.getElementById('busca').value.toLowerCase();
        document.querySelectorAll('#corpoHistorico tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(t) ? '' : 'none';
        });
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    atualizarTabelas();
</script>
</body>
</html>
