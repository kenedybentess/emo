<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Super User Mode)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; 
            --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        #main-content { display: none; }
        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .texto-ajuda { 
            display: block; background: #f8f9fa; border-left: 4px solid #3498db;
            padding: 15px; margin: 15px 0; color: #666; font-size: 13px; line-height: 1.6;
        }

        .item-nome { color: #e67e22; font-weight: bold; font-size: 14px; display: block; margin-bottom: 2px; }
        .item-desc { color: #d35400; font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; }
        .item-peso { color: #7f8c8d; font-size: 10px; font-style: italic; display: block; margin-top: 2px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-reg { background: var(--primary); width: 100%; margin-top: 10px; padding: 12px; }
        .btn-danger { background: var(--danger); font-size: 10px; padding: 4px 8px; }
        .btn-edit { background: var(--info); font-size: 10px; padding: 4px 8px; margin-right: 5px; }
        
        #calc-peso-container { background: #e8f4fd; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px dashed var(--info); display: none; }

        #modal-historico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; width: 95%; margin: 30px auto; padding: 25px; border-radius: 8px; position: relative; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width:100%" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <button onclick="abrirHistorico()" style="background: white; color: var(--primary); padding:15px; width:100%; border: 2px solid var(--primary); margin-bottom:20px; font-weight:bold;">🕒 HISTÓRICO DE MOVIMENTOS</button>

        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 style="color: var(--danger)">📂 GESTÃO DE CADASTROS</h3>
                <select id="admin_modo" onchange="alternarFormAdmin()">
                    <option value="PROD">CADASTRO / EDITAR ARTIGOS</option>
                    <option value="ORDEM">ORDENS DE FABRICO</option>
                </select>
                <div id="form-prod">
                    <label>Código do Artigo</label>
                    <input type="text" id="cad_cod" oninput="verificarExistencia(this.value)" placeholder="Digite o código para criar ou editar">
                    
                    <label>Nome do Produto</label><input type="text" id="cad_prod">
                    <label>Descrição Detalhada</label><input type="text" id="cad_desc">
                    <label>Peso Unitário (kg)</label><input type="number" step="0.001" id="cad_peso" placeholder="0.000">
                    <label>Stock Mínimo</label><input type="number" id="cad_min" value="5">
                    
                    <button id="btn-salvar-prod" class="btn-reg" onclick="salvarProduto()">GRAVAR ARTIGO</button>
                    <button id="btn-limpar-cad" style="background:#95a5a6; width:100%; margin-top:5px; display:none;" onclick="limparCamposCad()">CANCELAR / LIMPAR</button>
                </div>
                <div id="form-ordem" style="display:none">
                    <label>Nº OF</label><input type="text" id="ord_id">
                    <label>Cód. Artigo</label><input type="text" id="ord_cod" oninput="procv(this.value, 'ord_nome', '')">
                    <input type="text" id="ord_nome" readonly style="color: var(--done); font-weight: bold;">
                    <label>Meta Unidades</label><input type="number" id="ord_meta">
                    <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR OF</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--info)">🚀 MOVIMENTAR STOCK</h3>
                <label>Tipo</label>
                <select id="mov_tipo" onchange="alternarCamposEntrada()">
                    <option value="ENTRADA">ENTRADA (Via OF)</option>
                    <option value="SAIDA">SAÍDA (Expedição)</option>
                </select>
                <div id="campos-entrada">
                    <label>Selecionar OF</label>
                    <select id="mov_ordem_id" onchange="preencherPelaOrdem()"><option value="">A carregar...</option></select>
                </div>
                <div id="campos-saida" style="display:none">
                    <label>Código Artigo</label>
                    <input type="text" id="mov_cod" oninput="procv(this.value, 'nome_prod', 'desc_prod')">
                </div>
                <input type="text" id="nome_prod" readonly placeholder="Produto">
                <input type="text" id="desc_prod" readonly placeholder="Descrição">
                <input type="number" id="mov_qtd" placeholder="Quantidade" oninput="calcularPesoTotal()">
                
                <div id="calc-peso-container">
                    <strong>Peso Unitário:</strong> <span id="display-peso-un">0</span> kg<br>
                    <strong>Peso Total da Carga:</strong> <span id="display-peso-total" style="font-size: 16px; color: var(--info);">0.000</span> <strong>kg</strong>
                </div>

                <button class="btn-reg" onclick="lancarMovimento()">CONFIRMAR REGISTO</button>
            </div>
        </div>

        <div class="card" style="margin-bottom:20px">
            <h3>📋 ORDENS EM CURSO</h3>
            <table>
                <thead><tr><th>OF</th><th>CÓDIGO</th><th>ARTIGO</th><th>META</th><th>REAL</th><th>%</th><th class="super-only">AÇÃO</th></tr></thead>
                <tbody id="corpoOrdens"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>📊 STOCK ATUAL</h3>
            <table>
                <thead><tr><th>CÓDIGO</th><th>ARTIGO</th><th>SALDO</th><th>MÍN</th><th>AÇÕES</th></tr></thead>
                <tbody id="corpoStock"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-historico">
    <div class="modal-content">
        <span onclick="fecharHistorico()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px;">&times;</span>
        <h2>🕒 HISTÓRICO DE MOVIMENTOS</h2>
        <table style="font-size:11px">
            <thead><tr><th>DATA</th><th>REF</th><th>COD</th><th>ARTIGO</th><th>QTD</th><th>PESO TOTAL</th><th>USER</th><th class="super-only">AÇÃO</th></tr></thead>
            <tbody id="corpoHist"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let userEmail = "";
    let produtosGlobal = {};
    let ordensGlobal = {};
    let movsGlobal = {};
    let pesoUnitarioAtual = 0;

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => {
                userEmail = res.user.email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-display').innerText = userEmail;
                if(userEmail.includes("admin") || userEmail.includes("super")) document.getElementById('panel-admin').style.display = 'block';
                carregarDados();
            }).catch(() => alert("Falha no login"));
    }

    function carregarDados() {
        db.ref('produtos').on('value', s => { produtosGlobal = s.val() || {}; renderizarTudo(); });
        db.ref('ordens').on('value', s => { ordensGlobal = s.val() || {}; atualizarSelectOrdens(); renderizarTudo(); });
        db.ref('movimentacoes').on('value', s => { movsGlobal = s.val() || {}; renderizarTudo(); renderizarHistorial(); });
    }

    // FUNÇÕES DE EDIÇÃO
    function verificarExistencia(cod) {
        const c = cod.toUpperCase().trim();
        const p = produtosGlobal[c];
        const btn = document.getElementById('btn-salvar-prod');
        const btnLimpar = document.getElementById('btn-limpar-cad');

        if (p) {
            document.getElementById('cad_prod').value = p.prod;
            document.getElementById('cad_desc').value = p.desc || "";
            document.getElementById('cad_peso').value = p.peso || "";
            document.getElementById('cad_min').value = p.min || "5";
            btn.innerHTML = "ATUALIZAR DADOS";
            btn.style.background = "#e67e22";
            btnLimpar.style.display = "block";
        } else {
            btn.innerHTML = "GRAVAR ARTIGO";
            btn.style.background = ""; 
            btnLimpar.style.display = "none";
        }
    }

    function carregarParaEditar(cod) {
        document.getElementById('admin_modo').value = "PROD";
        alternarFormAdmin();
        document.getElementById('cad_cod').value = cod;
        verificarExistencia(cod);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function limparCamposCad() {
        document.getElementById('cad_cod').value = "";
        document.getElementById('cad_prod').value = "";
        document.getElementById('cad_desc').value = "";
        document.getElementById('cad_peso').value = "";
        document.getElementById('cad_min').value = "5";
        verificarExistencia("");
    }

    function salvarProduto() {
        const c = document.getElementById('cad_cod').value.toUpperCase().trim();
        const p = document.getElementById('cad_prod').value;
        const d = document.getElementById('cad_desc').value;
        const w = document.getElementById('cad_peso').value;
        const m = document.getElementById('cad_min').value;
        if(c && p) {
            db.ref('produtos/'+c).set({ prod: p, desc: d, peso: w, min: m }).then(() => {
                alert("Guardado!");
                limparCamposCad();
            });
        }
    }

    function renderizarTudo() {
        const isSuper = userEmail === "super@i9.com";
        const isAdmin = userEmail.includes("admin") || isSuper;
        const histArray = Object.entries(movsGlobal).map(([id, val]) => ({id, ...val}));

        // STOCK
        const corpoStock = document.getElementById('corpoStock'); corpoStock.innerHTML = '';
        const saldos = {};
        for(let c in produtosGlobal) saldos[c] = { ...produtosGlobal[c], total: 0 };
        histArray.forEach(h => {
            if(saldos[h.cod]) {
                const q = parseFloat(h.qtd) || 0;
                if(h.tipo === 'ORDEM' || h.tipo === 'ENTRADA') saldos[h.cod].total += q;
                else saldos[h.cod].total -= q;
            }
        });
        for(let c in saldos) {
            corpoStock.innerHTML += `<tr>
                <td><b>${c}</b></td>
                <td>
                    <span class="item-nome">${saldos[c].prod}</span>
                    <span class="item-desc">${saldos[c].desc || ""}</span>
                    <span class="item-peso">Peso Unit.: ${saldos[c].peso || "0"} kg</span>
                </td>
                <td><b>${saldos[c].total}</b></td><td>${saldos[c].min}</td>
                <td>
                    ${isAdmin ? `<button class="btn-edit" onclick="carregarParaEditar('${c}')">EDITAR</button>` : ''}
                    ${isSuper ? `<button class="btn-danger" onclick="db.ref('produtos/${c}').remove()">DEL</button>` : ''}
                </td>
            </tr>`;
        }

        // ORDENS
        const corpoOrdens = document.getElementById('corpoOrdens'); corpoOrdens.innerHTML = '';
        for(let id in ordensGlobal) {
            const feito = histArray.filter(h => h.ordem === id).reduce((a, b) => a + (parseFloat(b.qtd) || 0), 0);
            const perc = ((feito/ordensGlobal[id].meta)*100).toFixed(0);
            const pInfo = produtosGlobal[ordensGlobal[id].cod] || {};
            corpoOrdens.innerHTML += `<tr>
                <td style="color:var(--done); font-weight:bold">${id}</td>
                <td>${ordensGlobal[id].cod}</td>
                <td>
                    <span class="item-nome">${ordensGlobal[id].prod}</span>
                    <span class="item-desc">${pInfo.desc || ""}</span>
                </td>
                <td>${ordensGlobal[id].meta}</td><td><b>${feito}</b></td><td>${perc}%</td>
                <td class="super-only">${isSuper ? `<button class="btn-danger" onclick="db.ref('ordens/${id}').remove()">DEL</button>` : ''}</td>
            </tr>`;
        }
    }

    // Funções de Cálculo e Histórico
    function calcularPesoTotal() {
        const qtd = parseFloat(document.getElementById('mov_qtd').value) || 0;
        const total = (qtd * pesoUnitarioAtual).toFixed(3);
        if (pesoUnitarioAtual > 0) {
            document.getElementById('calc-peso-container').style.display = 'block';
            document.getElementById('display-peso-un').innerText = pesoUnitarioAtual;
            document.getElementById('display-peso-total').innerText = total;
        } else { document.getElementById('calc-peso-container').style.display = 'none'; }
    }

    function preencherPelaOrdem() {
        const id = document.getElementById('mov_ordem_id').value;
        if(id && ordensGlobal[id]) {
            const cod = ordensGlobal[id].cod;
            document.getElementById('nome_prod').value = ordensGlobal[id].prod;
            document.getElementById('desc_prod').value = produtosGlobal[cod]?.desc || "";
            pesoUnitarioAtual = parseFloat(produtosGlobal[cod]?.peso) || 0;
            calcularPesoTotal();
        }
    }

    function procv(cod, n, d) {
        const i = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById(n).value = i ? i.prod : "";
        if(d) document.getElementById(d).value = i ? (i.desc || "") : "";
        pesoUnitarioAtual = i ? parseFloat(i.peso) || 0 : 0;
        calcularPesoTotal();
    }

    function lancarMovimento() {
        const t = document.getElementById('mov_tipo').value;
        const q = parseFloat(document.getElementById('mov_qtd').value);
        if(!q) return;
        const pesoTotalCalc = (q * pesoUnitarioAtual).toFixed(3);
        let d = { data: new Date().toLocaleString('pt-pt'), qtd: q, peso_total: pesoTotalCalc, ope: userEmail };
        if(t === 'ENTRADA') {
            const id = document.getElementById('mov_ordem_id').value;
            if(!id) return;
            d.tipo = "ORDEM"; d.ordem = id; d.cod = ordensGlobal[id].cod; d.prod = ordensGlobal[id].prod;
        } else {
            const c = document.getElementById('mov_cod').value.toUpperCase().trim();
            if(!produtosGlobal[c]) return;
            d.tipo = "SAIDA"; d.cod = c; d.prod = produtosGlobal[c].prod;
        }
        db.ref('movimentacoes').push(d).then(() => { 
            alert("Feito!"); 
            document.getElementById('mov_qtd').value = ""; 
        });
    }

    function renderizarHistorial() {
        const corpo = document.getElementById('corpoHist'); corpo.innerHTML = '';
        Object.entries(movsGlobal).reverse().forEach(([id, h]) => {
            corpo.innerHTML += `<tr>
                <td>${h.data}</td><td>${h.ordem || h.tipo}</td><td>${h.cod}</td>
                <td><span class="item-nome" style="font-size:12px">${h.prod}</span></td>
                <td><b>${h.qtd}</b></td>
                <td style="color:var(--info)"><b>${h.peso_total || "0.000"} kg</b></td>
                <td>${h.ope.split('@')[0]}</td>
                <td class="super-only"><button class="btn-danger" onclick="db.ref('movimentacoes/${id}').remove()">DEL</button></td>
            </tr>`;
        });
    }

    function abrirHistorico() { document.getElementById('modal-historico').style.display = 'block'; }
    function fecharHistorico() { document.getElementById('modal-historico').style.display = 'none'; }
    function alternarFormAdmin() {
        const m = document.getElementById('admin_modo').value;
        document.getElementById('form-prod').style.display = m === 'PROD' ? 'block' : 'none';
        document.getElementById('form-ordem').style.display = m === 'ORDEM' ? 'block' : 'none';
    }
    function alternarCamposEntrada() {
        const t = document.getElementById('mov_tipo').value;
        document.getElementById('campos-entrada').style.display = t === 'ENTRADA' ? 'block' : 'none';
        document.getElementById('campos-saida').style.display = t === 'SAIDA' ? 'block' : 'none';
    }
    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem_id'); sel.innerHTML = '<option value="">Selecionar...</option>';
        for(let id in ordensGlobal) sel.innerHTML += `<option value="${id}">${id}</option>`;
    }
    function salvarOrdem() {
        const i = document.getElementById('ord_id').value.toUpperCase().trim();
        const c = document.getElementById('ord_cod').value.toUpperCase().trim();
        const m = document.getElementById('ord_meta').value;
        if(i && produtosGlobal[c]) db.ref('ordens/'+i).set({ cod: c, prod: produtosGlobal[c].prod, meta: m }).then(() => alert("OF Ativa!"));
    }
</script>
</body>
</html>
