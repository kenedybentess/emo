<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Check Descrição)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        #main-content { display: none; }

        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input:read-only { background: #f1f2f6; color: #555; font-style: italic; }
        
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-reg { background: var(--primary); width: 100%; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; color: white; font-weight: bold; }
        .desc-text { color: #7f8c8d; font-size: 11px; font-style: italic; display: block; margin-top: 2px; }
        .stock-baixo { background-color: #fff5f5; color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width: 100%;" onclick="fazerLogin()">ACEDER</button>
        <div id="login-msg" style="color: red; font-size: 11px; margin-top: 10px;"></div>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 id="titulo-admin">📂 CADASTRO / EDIÇÃO</h3>
                <label>Código</label><input type="text" id="cad_cod">
                <label>Produto</label><input type="text" id="cad_prod">
                <label>Descrição Detalhada</label><input type="text" id="cad_desc">
                <label>Stock Mínimo</label><input type="number" id="cad_min" value="5">
                <button id="btn-salvar" class="btn-reg" style="background: var(--danger)" onclick="salvarProduto()">SALVAR PRODUTO</button>
                <button id="btn-cancelar" class="btn-reg" style="background: #95a5a6; display:none; margin-top:5px;" onclick="resetFormAdmin()">CANCELAR</button>
            </div>

            <div class="card">
                <h3>🚀 MOVIMENTAÇÃO</h3>
                <label>Operação</label>
                <select id="mov_tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
                
                <label>Código do Item</label>
                <input type="text" id="mov_cod" placeholder="Digite o código..." oninput="procv(this.value)">
                
                <label>Produto Identificado</label>
                <input type="text" id="mov_nome" readonly placeholder="---">
                
                <label>Descrição do Item</label>
                <input type="text" id="mov_desc_auto" readonly placeholder="Aguardando código..." style="border-color: var(--info);">
                
                <label>Quantidade</label>
                <input type="number" id="mov_qtd">
                
                <button class="btn-reg" onclick="lancarMovimento()">REGISTAR MOVIMENTO</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 STOCK ATUAL</h3>
            <table>
                <thead><tr><th>CÓDIGO</th><th>PRODUTO / DESCRIÇÃO</th><th>SALDO</th><th>MÍN.</th><th>AÇÕES</th></tr></thead>
                <tbody id="corpoSaldo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const listaAdmins = ["admin@i9.com", "super@i9.com"]; 
    let produtosGlobal = {};
    let historicoGlobal = [];

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => configurarInterface(res.user.email))
            .catch(err => document.getElementById('login-msg').innerText = "Erro no acesso.");
    }

    function configurarInterface(email) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-display').innerText = email;
        if (listaAdmins.includes(email)) document.getElementById('panel-admin').style.display = 'block';
        carregarDados();
    }

    function carregarDados() {
        db.ref('produtos').on('value', snap => { produtosGlobal = snap.val() || {}; renderizarTabelas(); });
        db.ref('movimentacoes').on('value', snap => {
            const data = snap.val();
            historicoGlobal = data ? Object.values(data).reverse() : [];
            renderizarTabelas();
        });
    }

    // A mágica acontece aqui: preenche nome e descrição ao mesmo tempo
    function procv(cod) {
        const item = produtosGlobal[cod.toUpperCase().trim()];
        if(item) {
            document.getElementById('mov_nome').value = item.prod;
            document.getElementById('mov_desc_auto').value = item.desc || "Sem descrição cadastrada";
        } else {
            document.getElementById('mov_nome').value = "";
            document.getElementById('mov_desc_auto').value = "";
        }
    }

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.toUpperCase().trim();
        const prod = document.getElementById('cad_prod').value;
        const desc = document.getElementById('cad_desc').value;
        const min = parseInt(document.getElementById('cad_min').value) || 0;
        if(!cod || !prod) return alert("Código e Produto obrigatórios!");
        db.ref('produtos/' + cod).set({ prod, desc, min }).then(() => resetFormAdmin());
    }

    function lancarMovimento() {
        const cod = document.getElementById('mov_cod').value.toUpperCase().trim();
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const tipo = document.getElementById('mov_tipo').value;
        const ope = document.getElementById('user-display').innerText;

        if(!produtosGlobal[cod] || !qtd) return alert("Erro: Dados inválidos!");

        db.ref('movimentacoes').push({
            data: new Date().toLocaleString('pt-pt'),
            tipo, cod, qtd, ope, 
            prod: produtosGlobal[cod].prod,
            desc: produtosGlobal[cod].desc // Descrição salva no histórico
        }).then(() => {
            document.getElementById('mov_cod').value = "";
            document.getElementById('mov_qtd').value = "";
            document.getElementById('mov_nome').value = "";
            document.getElementById('mov_desc_auto').value = "";
        });
    }

    function resetFormAdmin() {
        document.getElementById('titulo-admin').innerText = "📂 CADASTRO / EDIÇÃO";
        document.getElementById('cad_cod').value = ""; document.getElementById('cad_cod').readOnly = false;
        document.getElementById('cad_prod').value = ""; document.getElementById('cad_desc').value = "";
        document.getElementById('btn-salvar').innerText = "SALVAR PRODUTO";
        document.getElementById('btn-cancelar').style.display = "none";
    }

    function renderizarTabelas() {
        const corpoSaldo = document.getElementById('corpoSaldo');
        corpoSaldo.innerHTML = '';
        const saldos = {};
        for(let c in produtosGlobal) saldos[c] = { ...produtosGlobal[c], e: 0, s: 0 };
        historicoGlobal.forEach(l => {
            if(saldos[l.cod]) {
                if(l.tipo === 'ENTRADA') saldos[l.cod].e += l.qtd; else saldos[l.cod].s += l.qtd;
            }
        });

        for(let c in saldos) {
            const total = saldos[c].e - saldos[c].s;
            const critico = total <= (saldos[c].min || 0);
            corpoSaldo.innerHTML += `
                <tr class="${critico ? 'stock-baixo' : ''}">
                    <td><b>${c}</b></td>
                    <td>${saldos[c].prod}<span class="desc-text">${saldos[c].desc || ''}</span></td>
                    <td>${total} ${critico ? '⚠️' : ''}</td>
                    <td>${saldos[c].min || 0}</td>
                    <td>${listaAdmins.includes(document.getElementById('user-display').innerText) ? `<button onclick="editarProduto('${c}')" style="background:var(--info); font-size:9px">EDITAR</button>` : '---'}</td>
                </tr>`;
        }
    }
</script>
</body>
</html>
