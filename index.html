<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        
        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        
        /* Layout */
        #main-content { display: none; }
        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Forms */
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input:read-only { background: #f1f2f6; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-reg { background: var(--primary); width: 100%; }
        .btn-edit { background: var(--info); padding: 5px 10px; font-size: 10px; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 10px; margin-left: 5px; }
        
        /* Tabelas */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        /* Alertas de Stock */
        .stock-critico { background-color: #fff5f5 !important; color: var(--danger); font-weight: bold; }
        .alert-pill { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width: 100%;" onclick="fazerLogin()">ENTRAR</button>
        <div id="login-msg" style="color: red; font-size: 11px; margin-top: 10px;"></div>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3 id="form-title">📂 CADASTRO DE PRODUTO</h3>
                <label>Código (ID Único)</label><input type="text" id="cad_cod">
                <label>Produto</label><input type="text" id="cad_prod">
                <label>Descrição</label><input type="text" id="cad_desc">
                <label>Stock Mínimo (Alerta)</label><input type="number" id="cad_min" value="5">
                <button id="btn-save" class="btn-reg" style="background: var(--danger)" onclick="salvarProduto()">CADASTRAR PRODUTO</button>
                <button id="btn-cancel" class="btn-reg" style="background: #95a5a6; display:none; margin-top:5px;" onclick="limparFormAdmin()">CANCELAR EDIÇÃO</button>
            </div>

            <div class="card">
                <h3>🚀 MOVIMENTAÇÃO</h3>
                <label>Operação</label>
                <select id="mov_tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
                <label>Código</label><input type="text" id="mov_cod" oninput="procv(this.value)">
                <label>Produto</label><input type="text" id="mov_nome" readonly>
                <label>Quantidade</label><input type="number" id="mov_qtd">
                <button class="btn-reg" onclick="lancarMovimento()">REGISTAR</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 STOCK ATUAL & GESTÃO</h3>
            <input type="text" id="inputPesquisa" placeholder="Filtrar tabela..." onkeyup="renderizar()" style="margin-bottom: 15px;">
            <table>
                <thead>
                    <tr>
                        <th>CÓDIGO</th>
                        <th>PRODUTO / DESCRIÇÃO</th>
                        <th>SALDO</th>
                        <th>MÍN.</th>
                        <th>AÇÕES (ADMIN)</th>
                    </tr>
                </thead>
                <tbody id="corpoSaldo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const listaAdmins = ["admin@i9.com"]; // Ajusta os teus admins aqui
    let editandoCod = null;

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => configurarInterface(res.user.email))
            .catch(err => document.getElementById('login-msg').innerText = "Erro no acesso.");
    }

    function configurarInterface(email) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-display').innerText = email;
        if (listaAdmins.includes(email)) document.getElementById('panel-admin').style.display = 'block';
        carregarDados();
    }

    let produtosGlobal = {};
    let historicoGlobal = [];

    function carregarDados() {
        db.ref('produtos').on('value', snap => { produtosGlobal = snap.val() || {}; renderizar(); });
        db.ref('movimentacoes').on('value', snap => {
            const data = snap.val();
            historicoGlobal = data ? Object.values(data) : [];
            renderizar();
        });
    }

    function procv(cod) {
        const info = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById('mov_nome').value = info ? info.prod : "";
    }

    // --- FUNÇÕES ADMIN: SALVAR / EDITAR / EXCLUIR ---

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.toUpperCase().trim();
        const prod = document.getElementById('cad_prod').value;
        const desc = document.getElementById('cad_desc').value;
        const min = parseInt(document.getElementById('cad_min').value) || 0;

        if(!cod || !prod) return alert("Código e Produto obrigatórios!");

        db.ref('produtos/' + cod).set({ prod, desc, min }).then(() => {
            alert(editandoCod ? "Produto Atualizado!" : "Produto Cadastrado!");
            limparFormAdmin();
        });
    }

    function editarProduto(cod) {
        const p = produtosGlobal[cod];
        editandoCod = cod;
        document.getElementById('form-title').innerText = "✏️ EDITAR PRODUTO";
        document.getElementById('cad_cod').value = cod;
        document.getElementById('cad_cod').readOnly = true;
        document.getElementById('cad_prod').value = p.prod;
        document.getElementById('cad_desc').value = p.desc;
        document.getElementById('cad_min').value = p.min || 0;
        document.getElementById('btn-save').innerText = "GUARDAR ALTERAÇÕES";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function excluirProduto(cod) {
        if(confirm(`Tem certeza que deseja excluir o produto ${cod}? Isso não apagará o histórico, mas o produto sumirá da lista.`)) {
            db.ref('produtos/' + cod).remove();
        }
    }

    function limparFormAdmin() {
        editandoCod = null;
        document.getElementById('form-title').innerText = "📂 CADASTRO DE PRODUTO";
        document.getElementById('cad_cod').value = "";
        document.getElementById('cad_cod').readOnly = false;
        document.getElementById('cad_prod').value = "";
        document.getElementById('cad_desc').value = "";
        document.getElementById('cad_min').value = "5";
        document.getElementById('btn-save').innerText = "CADASTRAR PRODUTO";
        document.getElementById('btn-cancel').style.display = "none";
    }

    // --- MOVIMENTAÇÃO ---

    function lancarMovimento() {
        const cod = document.getElementById('mov_cod').value.toUpperCase().trim();
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const tipo = document.getElementById('mov_tipo').value;
        const ope = document.getElementById('user-display').innerText;

        if(!produtosGlobal[cod] || !qtd) return alert("Erro: Dados inválidos!");

        db.ref('movimentacoes').push({
            data: new Date().toLocaleString('pt-pt'),
            tipo, cod, qtd, ope, prod: produtosGlobal[cod].prod
        }).then(() => {
            document.getElementById('mov_cod').value = "";
            document.getElementById('mov_qtd').value = "";
            document.getElementById('mov_nome').value = "";
        });
    }

    function renderizar() {
        const filtro = document.getElementById('inputPesquisa').value.toLowerCase();
        const corpo = document.getElementById('corpoSaldo');
        const isAdmin = listaAdmins.includes(document.getElementById('user-display').innerText);
        corpo.innerHTML = '';
        
        const saldos = {};
        // Inicializa saldos com todos os produtos cadastrados
        for(let c in produtosGlobal) saldos[c] = { prod: produtosGlobal[c].prod, desc: produtosGlobal[c].desc, min: produtosGlobal[c].min || 0, e: 0, s: 0 };
        
        // Calcula a partir do histórico
        historicoGlobal.forEach(l => {
            if(saldos[l.cod]) {
                if(l.tipo === 'ENTRADA') saldos[l.cod].e += l.qtd; else saldos[l.cod].s += l.qtd;
            }
        });

        for(let c in saldos) {
            const total = saldos[c].e - saldos[c].s;
            const min = saldos[c].min;
            const critico = total <= min;

            if(c.toLowerCase().includes(filtro) || saldos[c].prod.toLowerCase().includes(filtro)) {
                corpo.innerHTML += `
                    <tr class="${critico ? 'stock-critico' : ''}">
                        <td><b>${c}</b></td>
                        <td>${saldos[c].prod} <br><small style="color:#888">${saldos[c].desc || ''}</small></td>
                        <td>
                            ${total} 
                            ${critico ? '<span class="alert-pill">STOCK BAIXO</span>' : ''}
                        </td>
                        <td>${min}</td>
                        <td>
                            ${isAdmin ? `
                                <button class="btn-edit" onclick="editarProduto('${c}')">EDITAR</button>
                                <button class="btn-del" onclick="excluirProduto('${c}')">X</button>
                            ` : '---'}
                        </td>
                    </tr>`;
            }
        }
    }
</script>
</body>
</html>
