<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque v2.1 - Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* Estilos mantidos para consistência visual */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 16px; }
    .btn { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
    .header { background: white; border-bottom: 1px solid #d2d2d7; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .hidden { display: none !important; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-error { background: #ffebeb; color: #c41e3a; border: 1px solid #ffcccc; }
</style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h1>Estoque Supabase</h1>
    <p>Digite suas credenciais</p>
    <div id="loginAlert"></div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••">
    </div>
    <button class="btn" onclick="executarLogin()">Entrar</button>
  </div>
</div>

<div id="appScreen" class="hidden">
  <div class="header">
    <h2>Painel de Controle</h2>
    <div>
      <span id="txtUsuario"></span>
      <button onclick="location.reload()" style="margin-left:10px;">Sair</button>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <h3>Bem-vindo ao sistema de inventário.</h3>
      <p>Conexão com banco de dados ativa.</p>
    </div>
  </div>
</div>

<script>
// Credenciais do seu banco de dados
const SUPABASE_URL = 'https://lwqkjjlyyaohjzqpwwiv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iA0VKR6xQ3lvmf5gf3d1MA_mwiEW__l';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function executarLogin() {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginSenha').value;
    const alertBox = document.getElementById('loginAlert');

    if (!email || !senha) {
        alertBox.innerHTML = '<div class="alert alert-error">Preencha todos os campos.</div>';
        return;
    }

    try {
        // Busca o usuário na tabela 'usuarios'
        const { data, error } = await supabase
            .from('usuarios')
            .select('*')
            .eq('email', email)
            .eq('senha', senha) // Verificação simples de senha
            .single();

        if (error) {
            console.error("Erro Supabase:", error.message);
            alertBox.innerHTML = `<div class="alert alert-error">Erro: ${error.message}. Verifique as políticas RLS no painel.</div>`;
            return;
        }

        if (data) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('txtUsuario').textContent = `Olá, ${data.nome}`;
        } else {
            alertBox.innerHTML = '<div class="alert alert-error">Usuário não encontrado ou senha incorreta.</div>';
        }

    } catch (err) {
        console.error("Erro inesperado:", err);
        alertBox.innerHTML = '<div class="alert alert-error">Falha na conexão com o servidor.</div>';
    }
}
</script>
</body>
</html>
