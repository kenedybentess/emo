<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque Online</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
    .login-box h1 { text-align: center; margin-bottom: 30px; font-size: 24px; }
    .login-box input, .login-box select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 16px; }
    .login-box button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007aff; color: white; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
    .login-error { color: #ff3b30; text-align: center; margin-top: 10px; font-size: 14px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header-left h1 { font-size: 28px; margin-bottom: 10px; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .user-badge { background: #e8e8ed; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav button { padding: 10px 20px; border: none; border-radius: 8px; background: #e8e8ed; cursor: pointer; font-size: 14px; font-weight: 500; }
    nav button.active { background: #007aff; color: white; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .metric { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; }
    .metric h3 { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    .metric p { font-size: 32px; font-weight: 700; }
    .metric.alert { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e8e8ed; }
    th { font-weight: 600; color: #6e6e73; font-size: 13px; text-transform: uppercase; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge.ok { background: #d1f4e0; color: #0a5; }
    .badge.warn { background: #ffe4b3; color: #a60; }
    .badge.danger { background: #ffd4d4; color: #c00; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-primary { background: #007aff; color: white; }
    .btn-success { background: #34c759; color: white; }
    .btn-danger { background: #ff3b30; color: white; }
    .btn-logout { background: #8e8e93; color: white; }
    .actions button { padding: 6px 12px; font-size: 12px; }
    .hidden { display: none!important; }
    .alerta { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
    .sync-status { position: fixed; bottom: 20px; right: 20px; background: #34c759; color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1>📦 Controle de Estoque</h1>
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password" onkeypress="if(event.key==='Enter') fazerLogin()">
        <button onclick="fazerLogin()">Entrar</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<div id="sistema" class="container hidden">
    <header>
        <div class="header-left">
            <h1>📦 Estoque Online</h1>
            <nav>
                <button onclick="showTab('dashboard')" class="active" id="btn-dashboard">Dashboard</button>
                <button onclick="showTab('produtos')" id="btn-produtos">Produtos</button>
                <button onclick="showTab('movimentar')" id="btn-movimentar">Entrada/Saída</button>
                <button onclick="showTab('historico')" id="btn-historico">Histórico</button>
                <button onclick="showTab('usuarios')" id="btn-usuarios" class="admin-only">Usuários</button>
            </nav>
        </div>
        <div class="user-info">
            <span class="user-badge" id="userBadge"></span>
            <button class="btn btn-logout" onclick="logout()">Sair</button>
        </div>
    </header>

    <div id="dashboard" class="tab">
        <div class="grid" id="metrics"></div>
        <div class="card">
            <h2>⚠️ Alertas de Estoque Baixo</h2>
            <div id="alertas"></div>
        </div>
    </div>

    <div id="produtos" class="tab hidden">
        <div class="card admin-only">
            <h2>Cadastrar Produto</h2>
            <div class="form-grid">
                <input type="text" id="codigo" placeholder="Código*" required>
                <input type="text" id="nome" placeholder="Descrição*" required>
                <input type="number" id="qtd" placeholder="Quantidade" min="0" value="0">
                <input type="number" id="minimo" placeholder="Mínimo" min="0" value="0">
            </div>
            <button class="btn btn-primary" onclick="addProduto()">Cadastrar Produto</button>
        </div>
        <div class="card">
            <h2>Lista de Produtos</h2>
            <input type="text" id="busca" placeholder="Buscar por código ou descrição..." onkeyup="renderProdutos()" style="margin-bottom:15px;">
            <div style="overflow-x:auto;">
                <table id="tabela-produtos"></table>
            </div>
        </div>
    </div>

    <div id="movimentar" class="tab hidden">
        <div class="card">
            <h2>Registrar Movimentação</h2>
            <div class="form-grid">
                <select id="mov-produto" onchange="updateSaldo()"></select>
                <select id="mov-tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
                <input type="number" id="mov-qtd" placeholder="Quantidade" min="1" value="1">
            </div>
            <p id="saldo-atual" style="margin:15px 0; font-weight:600;"></p>
            <button class="btn btn-success" onclick="registrarMov()">Registrar Movimentação</button>
        </div>
    </div>

    <div id="historico" class="tab hidden">
        <div class="card">
            <h2>Histórico de Movimentações</h2>
            <select id="filtro-produto" onchange="renderHistorico()" style="margin-bottom:15px; max-width:300px;">
                <option value="">Todos os produtos</option>
            </select>
            <div style="overflow-x:auto;">
                <table id="tabela-historico"></table>
            </div>
        </div>
    </div>

    <div id="usuarios" class="tab hidden">
        <div class="card">
            <h2>Cadastrar Novo Usuário</h2>
            <div class="form-grid">
                <input type="email" id="novoEmail" placeholder="Email do usuário*" required>
                <input type="password" id="novoPass" placeholder="Senha (min 6 caracteres)*" required>
                <select id="novoNivel">
                    <option value="user">Usuário Comum</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="criarUsuario()">Criar Usuário</button>
            <div id="userError" class="login-error"></div>
        </div>
        <div class="card">
            <h2>Usuários Cadastrados</h2>
            <div style="overflow-x:auto;">
                <table id="tabela-usuarios"></table>
            </div>
        </div>
    </div>
</div>

<div id="syncStatus" class="sync-status hidden">✓ Sincronizado</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getDatabase, ref, set, push, onValue, remove, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyD2IZIVK0FKwo8ADp1t1X87VNrB-HP0tCY",
  authDomain: "controle-estoque-d94e3.firebaseapp.com",
  databaseURL: "https://controle-estoque-d94e3-default-rtdb.firebaseio.com",
  projectId: "controle-estoque-d94e3",
  storageBucket: "controle-estoque-d94e3.firebasestorage.app",
  messagingSenderId: "622590910156",
  appId: "1:622590910156:web:ab851e8b85bb5092296c69"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let usuarioLogado = null;
let nivelUsuario = 'user';
let produtosCache = [];
let movimentacoesCache = [];
let usuariosCache = [];

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userRef = ref(db, `usuarios/${user.uid}`);
        const snapshot = await get(userRef);
        const dados = snapshot.val();
        usuarioLogado = user;
        nivelUsuario = dados?.nivel || 'user';
        iniciarSistema();
        escutarDados();
    } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('sistema').classList.add('hidden');
    }
});

window.fazerLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const error = document.getElementById('loginError');
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
        error.textContent = 'Email ou senha incorretos';
        setTimeout(() => error.textContent = '', 3000);
    }
};

window.criarUsuario = async () => {
    if (nivelUsuario !== 'admin') return alert('Apenas administradores podem criar usuários');
    const email = document.getElementById('novoEmail').value.trim();
    const pass = document.getElementById('novoPass').value;
    const nivel = document.getElementById('novoNivel').value;
    const error = document.getElementById('userError');
    if (!email || pass.length < 6) {
        error.textContent = 'Preencha email e senha com 6+ caracteres';
        return;
    }
    try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await set(ref(db, `usuarios/${cred.user.uid}`), { email, nivel, criadoPor: usuarioLogado.email });
        document.getElementById('novoEmail').value = '';
        document.getElementById('novoPass').value = '';
        error.textContent = '';
        alert(`Usuário ${email} criado com sucesso!`);
        await signOut(auth);
        await signInWithEmailAndPassword(auth, usuarioLogado.email, prompt('Digite sua senha novamente para continuar:'));
    } catch (e) {
        error.textContent = 'Erro: ' + e.message;
    }
};

window.logout = () => signOut(auth);

function escutarDados() {
    onValue(ref(db, 'produtos'), (snapshot) => {
        const data = snapshot.val() || {};
        produtosCache = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        renderProdutos();
        renderDashboard();
        renderMovimentar();
        mostrarSync();
    });
    onValue(ref(db, 'movimentacoes'), (snapshot) => {
        const data = snapshot.val() || {};
        movimentacoesCache = Object.entries(data).map(([id, val]) => ({ id, ...val }))
            .sort((a, b) => b.timestamp - a.timestamp);
        renderHistorico();
    });
    onValue(ref(db, 'usuarios'), (snapshot) => {
        const data = snapshot.val() || {};
        usuariosCache = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        renderUsuarios();
    });
}

function mostrarSync() {
    const el = document.getElementById('syncStatus');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 2000);
}

function iniciarSistema() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('sistema').classList.remove('hidden');
    document.getElementById('userBadge').textContent = `${usuarioLogado.email} - ${nivelUsuario}`;
    if (nivelUsuario !== 'admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
    } else {
        document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
    }
}

window.showTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.remove('hidden');
    document.getElementById('btn-' + tab).classList.add('active');
};

window.addProduto = async () => {
    if (nivelUsuario !== 'admin') return alert('Sem permissão');
    const p = {
        codigo: document.getElementById('codigo').value.trim(),
        nome: document.getElementById('nome').value.trim(),
        qtd: parseInt(document.getElementById('qtd').value) || 0,
        minimo: parseInt(document.getElementById('minimo').value) || 0,
        criado: new Date().toLocaleString('pt-BR')
    };
    if (!p.codigo || !p.nome) return alert('Preencha Código e Descrição!');
    if (produtosCache.find(x => x.codigo === p.codigo)) return alert('Código já existe!');
    await push(ref(db, 'produtos'), p);
    document.getElementById('codigo').value = '';
    document.getElementById('nome').value = '';
    document.getElementById('qtd').value = '0';
    document.getElementById('minimo').value = '0';
    alert('Produto cadastrado!');
};

window.deleteProduto = async (id) => {
    if (nivelUsuario !== 'admin') return alert('Sem permissão');
    if (confirm('Excluir este produto?')) {
        await remove(ref(db, `produtos/${id}`));
    }
};

window.registrarMov = async () => {
    const produtoId = document.getElementById('mov-produto').value;
    const tipo = document.getElementById('mov-tipo').value;
    const qtd = parseInt(document.getElementById('mov-qtd').value);
    if (!produtoId || !qtd) return alert('Selecione produto e quantidade');
    const produto = produtosCache.find(p => p.id === produtoId);
    if (tipo === 'saida' && produto.qtd < qtd) return alert('Estoque insuficiente!');
    const novaQtd = tipo === 'entrada' ? produto.qtd + qtd : produto.qtd - qtd;
    await update(ref(db, `produtos/${produtoId}`), { qtd: novaQtd });
    await push(ref(db, 'movimentacoes'), {
        produtoId: produtoId,
        tipo: tipo,
        quantidade: qtd,
        usuario: usuarioLogado.email,
        data: new Date().toLocaleString('pt-BR'),
        timestamp: Date.now()
    });
    if (novaQtd <= produto.minimo) alert(`⚠️ ${produto.nome} atingiu estoque mínimo!`);
    document.getElementById('mov-qtd').value = '1';
    alert('Movimentação registrada!');
};

window.updateSaldo = () => {
    const id = document.getElementById('mov-produto').value;
    const p = produtosCache.find(x => x.id === id);
    if (p) {
        document.getElementById('saldo-atual').innerHTML =
            `Estoque atual: <strong>${p.qtd}</strong> | Mínimo: ${p.minimo}`;
    }
};

function renderDashboard() {
    const total = produtosCache.length;
    const baixo = produtosCache.filter(p => p.qtd <= p.minimo).length;
    document.getElementById('metrics').innerHTML = `
        <div class="metric"><h3>Total de Produtos</h3><p>${total}</p></div>
        <div class="metric ${baixo > 0 ? 'alert' : ''}"><h3>Abaixo do Mínimo</h3><p>${baixo}</p></div>
    `;
    const alertas = produtosCache.filter(p => p.qtd <= p.minimo);
    if (alertas.length > 0) {
        document.getElementById('alertas').innerHTML = `
            <div class="alerta">⚠️ ${alertas.length} produto(s) com estoque baixo</div>
            <table>
                <thead><tr><th>Código</th><th>Descrição</th><th>Quantidade</th><th>Mínimo</th></tr></thead>
                <tbody>
                    ${alertas.map(p => `
                        <tr>
                            <td>${p.codigo}</td>
                            <td>${p.nome}</td>
                            <td><span class="badge danger">${p.qtd}</span></td>
                            <td>${p.minimo}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } else {
        document.getElementById('alertas').innerHTML = '<p style="color:#0a5;">✓ Todos os produtos acima do mínimo</p>';
    }
}

function renderProdutos() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const filtrados = produtosCache.filter(p =>
        p.nome.toLowerCase().includes(busca) || p.codigo.toLowerCase().includes(busca)
    );
    const isAdmin = nivelUsuario === 'admin';
    const html = `
        <thead><tr><th>Código</th><th>Descrição</th><th>Quantidade</th><th>Mínimo</th>${isAdmin ? '<th>Ações</th>' : ''}</tr></thead>
        <tbody>
            ${filtrados.map(p => {
                const status = p.qtd === 0 ? 'danger' : p.qtd <= p.minimo ? 'warn' : 'ok';
                return `
                    <tr>
                        <td>${p.codigo}</td>
                        <td><strong>${p.nome}</strong></td>
                        <td><span class="badge ${status}">${p.qtd}</span></td>
                        <td>${p.minimo}</td>
                        ${isAdmin ? `<td class="actions"><button class="btn btn-danger" onclick="deleteProduto('${p.id}')">Excluir</button></td>` : ''}
                    </tr>
                `;
            }).join('')}
        </tbody>
    `;
    document.getElementById('tabela-produtos').innerHTML = html;
}

function renderMovimentar() {
    const select = document.getElementById('mov-produto');
    select.innerHTML = produtosCache.map(p =>
        `<option value="${p.id}">${p.codigo} - ${p.nome}</option>`
    ).join('');
    if (produtosCache.length > 0) updateSaldo();
}

function renderHistorico() {
    const filtroId = document.getElementById('filtro-produto').value;
    const filtroSelect = document.getElementById('filtro-produto');
    filtroSelect.innerHTML = '<option value="">Todos os produtos</option>' +
        produtosCache.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
    filtroSelect.value = filtroId;
    let movs = filtroId ? movimentacoesCache.filter(m => m.produtoId == filtroId) : movimentacoesCache;
    const html = `
        <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Usuário</th></tr></thead>
        <tbody>
            ${movs.slice(0, 100).map(m => {
                const p = produtosCache.find(x => x.id === m.produtoId);
                return `
                    <tr>
                        <td>${m.data}</td>
                        <td>${p ? p.nome : 'Excluído'}</td>
                        <td><span class="badge ${m.tipo === 'entrada' ? 'ok' : 'warn'}">${m.tipo}</span></td>
                        <td>${m.quantidade}</td>
                        <td>${m.usuario || '-'}</td>
                    </tr>
                `;
            }).join('')}
        </tbody>
    `;
    document.getElementById('tabela-historico').innerHTML = html;
}

function renderUsuarios() {
    const html = `
        <thead><tr><th>Email</th><th>Nível</th><th>Criado por</th></tr></thead>
        <tbody>
            ${usuariosCache.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td><span class="badge ${u.nivel === 'admin' ? 'ok' : 'warn'}">${u.nivel}</span></td>
                    <td>${u.criadoPor || '-'}</td>
                </tr>
            `).join('')}
        </tbody>
    `;
    document.getElementById('tabela-usuarios').innerHTML = html;
}
</script>
</body>
</html>
