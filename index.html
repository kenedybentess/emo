<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Estoque - v2.2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
    h1 { font-size: 24px; margin-bottom: 20px; text-align: center; color: #1d1d1f; }
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; margin-bottom: 5px; color: #6e6e73; }
    input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 16px; outline: none; }
    input:focus { border-color: #0071e3; }
    .btn { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 500; }
    .btn:disabled { background: #b0b0b0; cursor: not-allowed; }
    #msg { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 14px; display: none; }
    .error { background: #ffebeb; color: #d70015; border: 1px solid #ffb3b3; display: block !important; }
    .success { background: #e8f5e9; color: #2e7d32; display: block !important; }
    .hidden { display: none; }
    #appContent { background: white; padding: 40px; border-radius: 12px; text-align: center; }
</style>
</head>
<body>

<div id="loginArea" class="card">
    <h1>Estoque Pro</h1>
    <div id="msg"></div>
    
    <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="exemplo@email.com">
    </div>
    
    <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Sua senha">
    </div>
    
    <button id="btnEntrar" class="btn" onclick="tentarLogin()">Entrar</button>
    <p style="font-size: 11px; color: #86868b; margin-top: 15px; text-align: center;">
        Dica: Verifique se as credenciais na tabela 'usuarios' do Supabase são idênticas.
    </p>
</div>

<div id="appArea" class="hidden">
    <div id="appContent">
        <h1 id="boasVindas"></h1>
        <p>Acesso ao banco de dados confirmado com sucesso!</p>
        <br>
        <button class="btn" onclick="location.reload()">Sair do Sistema</button>
    </div>
</div>

<script>
// Configuração do Banco
const SB_URL = 'https://lwqkjjlyyaohjzqpwwiv.supabase.co';
const SB_KEY = 'sb_publishable_iA0VKR6xQ3lvmf5gf3d1MA_mwiEW__l';
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

async function tentarLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const btn = document.getElementById('btnEntrar');
    const msg = document.getElementById('msg');

    if (!email || !senha) {
        exibirErro("Por favor, preencha todos os campos.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Verificando...";
    msg.className = "";
    msg.innerText = "";

    try {
        // Tenta buscar o utilizador
        const { data, error } = await supabase
            .from('usuarios')
            .select('nome, email, senha')
            .eq('email', email)
            .maybeSingle();

        if (error) {
            // Se der erro aqui, o problema é provavelmente RLS ou nome da tabela
            console.error("Erro Supabase:", error);
            exibirErro("Erro de Conexão: " + error.message + ". Verifique as políticas RLS no painel do Supabase.");
        } 
        else if (!data) {
            exibirErro("Utilizador não encontrado no banco de dados.");
        } 
        else if (data.senha !== senha) {
            exibirErro("Senha incorreta.");
        } 
        else {
            // Sucesso
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('appArea').classList.remove('hidden');
            document.getElementById('boasVindas').innerText = "Bem-vindo, " + data.nome;
        }
    } catch (err) {
        exibirErro("Erro inesperado de rede.");
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.innerText = "Entrar";
    }
}

function exibirErro(texto) {
    const msg = document.getElementById('msg');
    msg.innerText = texto;
    msg.className = "error";
}
</script>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Configuração Inicial - Criar Usuário</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        <h2>Cadastrar Primeiro Usuário</h2>
        <p>Este script vai inserir um usuário diretamente na tabela <strong>usuarios</strong>.</p>
        <button id="btn" onclick="criarAdmin()" style="width:100%; padding:10px; background:#0071e3; color:white; border:none; cursor:pointer;">
            Criar Usuário Admin
        </button>
        <div id="status" style="margin-top:20px; font-size:14px;"></div>
    </div>

    <script>
        const SB_URL = 'https://lwqkjjlyyaohjzqpwwiv.supabase.co';
        const SB_KEY = 'sb_publishable_iA0VKR6xQ3lvmf5gf3d1MA_mwiEW__l';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function criarAdmin() {
            const status = document.getElementById('status');
            status.innerText = "Processando...";

            const novoUsuario = {
                nome: "Administrador",
                email: "admin@estoque.com",
                senha: "admin", // <--- Esta será sua senha
                perfil: "Admin",
                ativo: true
            };

            const { error } = await supabase
                .from('usuarios')
                .insert([novoUsuario]);

            if (error) {
                status.innerHTML = `<span style="color:red">Erro: ${error.message}</span><br>
                <small>Dica: Verifique se a tabela 'usuarios' existe e se as políticas RLS permitem inserção (INSERT).</small>`;
            } else {
                status.innerHTML = `<span style="color:green"><strong>Sucesso!</strong></span><br>
                Utilize os dados abaixo no seu login:<br><br>
                <strong>Email:</strong> admin@estoque.com<br>
                <strong>Senha:</strong> admin`;
            }
        }
    </script>
</body>
</html>

   
</body>
</html>
