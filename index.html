<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Super User Mode)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --entry: #27ae60; --exit: #e67e22; 
            --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; --done: #8e44ad; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; font-size: 13px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        #main-content { display: none; }
        .navbar { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .item-nome { color: #e67e22; font-weight: bold; font-size: 14px; display: block; margin-bottom: 2px; }
        .item-desc { color: #d35400; font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; }
        .btn-reg { background: var(--primary); width: 100%; margin-top: 10px; padding: 12px; }
        .btn-danger { background: var(--danger); font-size: 10px; padding: 4px 8px; }
        .btn-edit { background: var(--info); font-size: 10px; padding: 4px 8px; margin-right: 5px; }

        #modal-historico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; width: 95%; margin: 30px auto; padding: 25px; border-radius: 8px; position: relative; min-height: 80vh; }
        
        /* ESTILO DOS TOTAIS NO FILTRO */
        .resumo-filtro { 
            background: var(--primary); color: white; padding: 15px; 
            border-radius: 8px; display: flex; justify-content: space-around; 
            margin-bottom: 15px; font-size: 14px; border-left: 5px solid var(--info);
        }
        .resumo-item { text-align: center; }
        .resumo-val { display: block; font-size: 18px; font-weight: bold; color: #fff; }
        .resumo-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }

        .filtro-container { background: #f1f2f6; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .filtro-input { margin: 0 !important; flex: 1; border: 2px solid var(--info) !important; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>I9 INDUSTRIAL</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button style="background: var(--info); width:100%" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | <span id="user-display">---</span></div>
        <button onclick="auth.signOut().then(() => location.reload())" style="background:transparent; border:1px solid white;">Sair</button>
    </div>

    <div class="container">
        <button onclick="abrirHistorico()" style="background: white; color: var(--primary); padding:15px; width:100%; border: 2px solid var(--primary); margin-bottom:20px; font-weight:bold;">🕒 ABRIR HISTÓRICO COM TOTAIS</button>

        <div class="grid">
            <div id="panel-admin" class="card" style="display: none; border-top: 5px solid var(--danger);">
                <h3>📂 GESTÃO</h3>
                <select id="admin_modo" onchange="alternarFormAdmin()">
                    <option value="PROD">ARTIGOS</option>
                    <option value="ORDEM">ORDENS DE FABRICO</option>
                </select>
                <div id="form-prod">
                    <input type="text" id="cad_cod" placeholder="Código" oninput="verificarExistencia(this.value)">
                    <input type="text" id="cad_prod" placeholder="Nome">
                    <input type="text" id="cad_desc" placeholder="Descrição">
                    <input type="number" step="0.001" id="cad_peso" placeholder="Peso Unitário (kg)">
                    <input type="number" id="cad_min" value="5" placeholder="Mínimo">
                    <button id="btn-salvar-prod" class="btn-reg" onclick="salvarProduto()">GRAVAR / ATUALIZAR</button>
                    <button id="btn-limpar-cad" style="background:#95a5a6; width:100%; margin-top:5px; display:none;" onclick="limparCamposCad()">CANCELAR</button>
                </div>
                <div id="form-ordem" style="display:none">
                    <input type="text" id="ord_id" placeholder="Nº OF">
                    <input type="text" id="ord_cod" placeholder="Cód. Artigo" oninput="procv(this.value, 'ord_nome', '')">
                    <input type="text" id="ord_nome" readonly placeholder="Nome automático">
                    <input type="number" id="ord_meta" placeholder="Meta Unidades">
                    <button class="btn-reg" style="background: var(--done)" onclick="salvarOrdem()">CRIAR OF</button>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--info)">🚀 MOVIMENTAR</h3>
                <select id="mov_tipo" onchange="alternarCamposEntrada()">
                    <option value="ENTRADA">ENTRADA (Via OF)</option>
                    <option value="SAIDA">SAÍDA (Expedição)</option>
                </select>
                <div id="campos-entrada">
                    <select id="mov_ordem_id" onchange="preencherPelaOrdem()"></select>
                </div>
                <div id="campos-saida" style="display:none">
                    <input type="text" id="mov_cod" placeholder="Código Artigo" oninput="procv(this.value, 'nome_prod', 'desc_prod')">
                </div>
                <input type="text" id="nome_prod" readonly placeholder="Produto">
                <input type="text" id="desc_prod" readonly placeholder="Descrição">
                <input type="number" id="mov_qtd" placeholder="Quantidade" oninput="calcularPesoTotal()">
                <div id="calc-peso-container" style="display:none; color: var(--info); font-weight: bold; margin-bottom: 10px;">
                    Peso do Lançamento: <span id="display-peso-total">0.000</span> kg
                </div>
                <button class="btn-reg" onclick="lancarMovimento()">CONFIRMAR</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 STOCK ATUAL</h3>
            <table>
                <thead><tr><th>REF</th><th>ARTIGO</th><th>SALDO</th><th>AÇÕES</th></tr></thead>
                <tbody id="corpoStock"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-historico">
    <div class="modal-content">
        <span onclick="fecharHistorico()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px;">&times;</span>
        <h2>🕒 HISTÓRICO DE MOVIMENTOS</h2>
        
        <div class="filtro-container">
            <input type="text" id="inputFiltro" class="filtro-input" placeholder="Filtrar por OF, Artigo, Código ou Operador..." oninput="renderizarHistorial()">
        </div>

        <div class="resumo-filtro">
            <div class="resumo-item">
                <span class="resumo-label">Registos Encontrados</span>
                <span id="soma-count" class="resumo-val">0</span>
            </div>
            <div class="resumo-item">
                <span class="resumo-label">Quantidade Total (Pçs)</span>
                <span id="soma-qtd" class="resumo-val">0</span>
            </div>
            <div class="resumo-item">
                <span class="resumo-label">Peso Total (kg)</span>
                <span id="soma-peso" class="resumo-val">0.000</span>
            </div>
        </div>

        <table style="font-size:11px">
            <thead><tr><th>DATA</th><th>REF/OF</th><th>COD</th><th>ARTIGO</th><th>QTD</th><th>PESO</th><th>USER</th><th class="super-only">AÇÃO</th></tr></thead>
            <tbody id="corpoHist"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let userEmail = "";
    let produtosGlobal = {};
    let ordensGlobal = {};
    let movsGlobal = {};
    let pesoUnitarioAtual = 0;

    function fazerLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(res => {
                userEmail = res.user.email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-display').innerText = userEmail;
                if(userEmail.includes("admin") || userEmail.includes("super")) document.getElementById('panel-admin').style.display = 'block';
                carregarDados();
            }).catch(() => alert("Erro"));
    }

    function carregarDados() {
        db.ref('produtos').on('value', s => { produtosGlobal = s.val() || {}; renderizarTudo(); });
        db.ref('ordens').on('value', s => { ordensGlobal = s.val() || {}; atualizarSelectOrdens(); renderizarTudo(); });
        db.ref('movimentacoes').on('value', s => { movsGlobal = s.val() || {}; renderizarHistorial(); renderizarTudo(); });
    }

    // LÓGICA DE FILTRO COM SOMA
    function renderizarHistorial() {
        const filtro = document.getElementById('inputFiltro').value.toLowerCase();
        const corpo = document.getElementById('corpoHist'); 
        corpo.innerHTML = '';
        
        let totalQtd = 0;
        let totalPeso = 0;
        let contador = 0;

        const isSuper = userEmail === "super@i9.com";
        const lista = Object.entries(movsGlobal).reverse();

        lista.forEach(([id, h]) => {
            const termo = (h.prod + h.cod + (h.ordem || h.tipo) + h.ope).toLowerCase();
            
            if (termo.includes(filtro)) {
                const q = parseFloat(h.qtd) || 0;
                const p = parseFloat(h.peso_total) || 0;
                
                totalQtd += q;
                totalPeso += p;
                contador++;

                corpo.innerHTML += `<tr>
                    <td>${h.data}</td>
                    <td style="color:var(--info); font-weight:bold">${h.ordem || h.tipo}</td>
                    <td>${h.cod}</td>
                    <td><span class="item-nome" style="font-size:12px">${h.prod}</span></td>
                    <td><b>${q}</b></td>
                    <td style="color:var(--info)"><b>${p.toFixed(3)}</b></td>
                    <td>${h.ope.split('@')[0]}</td>
                    <td class="super-only">${isSuper ? `<button class="btn-danger" onclick="db.ref('movimentacoes/${id}').remove()">DEL</button>` : ''}</td>
                </tr>`;
            }
        });

        // Atualizar Quadro de Totais
        document.getElementById('soma-count').innerText = contador;
        document.getElementById('soma-qtd').innerText = totalQtd;
        document.getElementById('soma-peso').innerText = totalPeso.toFixed(3);
    }

    // Funções de Cadastro e Edição
    function verificarExistencia(cod) {
        const p = produtosGlobal[cod.toUpperCase().trim()];
        const btn = document.getElementById('btn-salvar-prod');
        if (p) {
            document.getElementById('cad_prod').value = p.prod;
            document.getElementById('cad_desc').value = p.desc || "";
            document.getElementById('cad_peso').value = p.peso || "";
            document.getElementById('cad_min').value = p.min || "5";
            btn.innerHTML = "ATUALIZAR ARTIGO"; btn.style.background = "#e67e22";
            document.getElementById('btn-limpar-cad').style.display = "block";
        } else {
            btn.innerHTML = "GRAVAR NOVO ARTIGO"; btn.style.background = "";
            document.getElementById('btn-limpar-cad').style.display = "none";
        }
    }

    function salvarProduto() {
        const c = document.getElementById('cad_cod').value.toUpperCase().trim();
        const p = document.getElementById('cad_prod').value;
        if(c && p) {
            db.ref('produtos/'+c).set({ 
                prod: p, desc: document.getElementById('cad_desc').value, 
                peso: document.getElementById('cad_peso').value, min: document.getElementById('cad_min').value 
            }).then(() => { alert("OK!"); limparCamposCad(); });
        }
    }

    function limparCamposCad() {
        document.getElementById('cad_cod').value = "";
        document.getElementById('cad_prod').value = "";
        document.getElementById('cad_desc').value = "";
        document.getElementById('cad_peso').value = "";
        verificarExistencia("");
    }

    function renderizarTudo() {
        const isAdmin = userEmail.includes("admin") || userEmail.includes("super");
        const corpoStock = document.getElementById('corpoStock'); corpoStock.innerHTML = '';
        const histArray = Object.values(movsGlobal);

        for(let c in produtosGlobal) {
            let saldo = 0;
            histArray.filter(h => h.cod === c).forEach(h => {
                if(h.tipo === 'ORDEM' || h.tipo === 'ENTRADA') saldo += parseFloat(h.qtd);
                else saldo -= parseFloat(h.qtd);
            });
            corpoStock.innerHTML += `<tr>
                <td><b>${c}</b></td>
                <td>
                    <span class="item-nome">${produtosGlobal[c].prod}</span>
                    <span class="item-peso">Unit: ${produtosGlobal[c].peso || "0"} kg</span>
                </td>
                <td style="font-size:16px"><b>${saldo}</b></td>
                <td>
                    ${isAdmin ? `<button class="btn-edit" onclick="carregarParaEditar('${c}')">EDITAR</button>` : ''}
                </td>
            </tr>`;
        }
    }

    function carregarParaEditar(cod) {
        document.getElementById('admin_modo').value = "PROD";
        alternarFormAdmin();
        document.getElementById('cad_cod').value = cod;
        verificarExistencia(cod);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calcularPesoTotal() {
        const q = parseFloat(document.getElementById('mov_qtd').value) || 0;
        const total = (q * pesoUnitarioAtual).toFixed(3);
        document.getElementById('display-peso-total').innerText = total;
        document.getElementById('calc-peso-container').style.display = pesoUnitarioAtual > 0 ? 'block' : 'none';
    }

    function preencherPelaOrdem() {
        const id = document.getElementById('mov_ordem_id').value;
        if(id && ordensGlobal[id]) {
            const cod = ordensGlobal[id].cod;
            document.getElementById('nome_prod').value = ordensGlobal[id].prod;
            document.getElementById('desc_prod').value = produtosGlobal[cod]?.desc || "";
            pesoUnitarioAtual = parseFloat(produtosGlobal[cod]?.peso) || 0;
            calcularPesoTotal();
        }
    }

    function procv(cod, n, d) {
        const i = produtosGlobal[cod.toUpperCase().trim()];
        document.getElementById(n).value = i ? i.prod : "";
        if(d) document.getElementById(d).value = i ? (i.desc || "") : "";
        pesoUnitarioAtual = i ? parseFloat(i.peso) || 0 : 0;
        calcularPesoTotal();
    }

    function lancarMovimento() {
        const t = document.getElementById('mov_tipo').value;
        const q = parseFloat(document.getElementById('mov_qtd').value);
        if(!q) return;
        let d = { 
            data: new Date().toLocaleString('pt-pt'), 
            qtd: q, 
            peso_total: (q * pesoUnitarioAtual).toFixed(3), 
            ope: userEmail 
        };
        if(t === 'ENTRADA') {
            const id = document.getElementById('mov_ordem_id').value;
            d.tipo = "ORDEM"; d.ordem = id; d.cod = ordensGlobal[id].cod; d.prod = ordensGlobal[id].prod;
        } else {
            const c = document.getElementById('mov_cod').value.toUpperCase().trim();
            d.tipo = "SAIDA"; d.cod = c; d.prod = produtosGlobal[c].prod;
        }
        db.ref('movimentacoes').push(d).then(() => { alert("Lançado!"); document.getElementById('mov_qtd').value = ""; });
    }

    function abrirHistorico() { document.getElementById('modal-historico').style.display = 'block'; renderizarHistorial(); }
    function fecharHistorico() { document.getElementById('modal-historico').style.display = 'none'; }
    function alternarFormAdmin() {
        const m = document.getElementById('admin_modo').value;
        document.getElementById('form-prod').style.display = m === 'PROD' ? 'block' : 'none';
        document.getElementById('form-ordem').style.display = m === 'ORDEM' ? 'block' : 'none';
    }
    function alternarCamposEntrada() {
        const t = document.getElementById('mov_tipo').value;
        document.getElementById('campos-entrada').style.display = t === 'ENTRADA' ? 'block' : 'none';
        document.getElementById('campos-saida').style.display = t === 'SAIDA' ? 'block' : 'none';
    }
    function atualizarSelectOrdens() {
        const sel = document.getElementById('mov_ordem_id'); sel.innerHTML = '<option value="">Selecionar...</option>';
        for(let id in ordensGlobal) sel.innerHTML += `<option value="${id}">${id}</option>`;
    }
    function salvarOrdem() {
        const i = document.getElementById('ord_id').value.toUpperCase().trim();
        const c = document.getElementById('ord_cod').value.toUpperCase().trim();
        const m = document.getElementById('ord_meta').value;
        if(i && produtosGlobal[c]) db.ref('ordens/'+i).set({ cod: c, prod: produtosGlobal[c].prod, meta: m }).then(() => alert("OF Criada"));
    }
</script>
</body>
</html>
