<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SGE - I9 Industrial (Login Cloud)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --entry: #27ae60; --info: #3498db; --light: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        
        /* Ecrã de Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        
        /* Interface Principal */
        #main-content { display: none; }
        .navbar { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .container { width: 96%; margin: 20px auto; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .admin-only { border-top: 5px solid var(--danger); } /* Destaque para área Admin */
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; width: 100%; }
        .btn-login { background: var(--info); margin-top: 15px; }
        .btn-reg { background: var(--primary); }
        .btn-logout { background: transparent; border: 1px solid white; width: auto; padding: 5px 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .status-pill { padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .bg-ok { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">I9 INDUSTRIAL</h2>
        <p style="font-size: 12px; color: #666;">Insira as suas credenciais</p>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button class="btn-login" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
        <div id="login-msg" style="color: red; font-size: 11px; margin-top: 10px;"></div>
    </div>
</div>

<div id="main-content">
    <div class="navbar">
        <div><b>SGE I9</b> | Usuário: <span id="user-display">---</span></div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="container">
        <div class="grid">
            <div id="panel-admin" class="card admin-only" style="display: none;">
                <h3 style="margin-top:0">📂 CADASTRO (ADMIN)</h3>
                <label>Código</label><input type="text" id="cad_cod">
                <label>Produto</label><input type="text" id="cad_prod">
                <label>Descrição</label><input type="text" id="cad_desc">
                <button class="btn-reg" style="background: var(--danger)" onclick="salvarProduto()">CADASTRAR NA NUVEM</button>
            </div>

            <div class="card">
                <h3 style="margin-top:0">🚀 MOVIMENTAÇÃO</h3>
                <label>Operação</label>
                <select id="mov_tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
                <label>Código</label><input type="text" id="mov_cod" oninput="procv(this.value)">
                <label>Produto</label><input type="text" id="mov_nome" readonly>
                <label>Quantidade</label><input type="number" id="mov_qtd">
                <button class="btn-reg" onclick="lancarMovimento()">REGISTAR</button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h3>📊 STOCK ATUAL</h3>
            <table>
                <thead><tr><th>CÓDIGO</th><th>PRODUTO</th><th>SALDO</th><th>STATUS</th></tr></thead>
                <tbody id="corpoSaldo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAPHVbVNdYEp_b7-_bWkTyn5jCVrbZogTo",
        authDomain: "i9-industrial.firebaseapp.com",
        databaseURL: "https://i9-industrial-default-rtdb.firebaseio.com",
        projectId: "i9-industrial",
        appId: "1:509803480353:web:dafdbc0fbc4b175c49aa60"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // LISTA DE ADMINS (Coloque aqui os e-mails que podem cadastrar produtos)
    const listaAdmins = ["admin@i9.com", "seu-email@teste.com"];

    // FUNÇÃO LOGIN
    function fazerLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('login-msg');

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                configurarInterface(user.email);
            })
            .catch((error) => {
                msg.innerText = "Falha no login: Verifique e-mail e senha.";
            });
    }

    function configurarInterface(email) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-display').innerText = email;

        // Verifica se é admin
        if (listaAdmins.includes(email)) {
            document.getElementById('panel-admin').style.display = 'block';
        }
        carregarDados();
    }

    function fazerLogout() {
        auth.signOut().then(() => location.reload());
    }

    // --- LÓGICA DE DADOS ---
    let produtosGlobal = {};
    let historicoGlobal = [];

    function carregarDados() {
        db.ref('produtos').on('value', snap => { produtosGlobal = snap.val() || {}; renderizar(); });
        db.ref('movimentacoes').on('value', snap => { 
            const data = snap.val();
            historicoGlobal = data ? Object.values(data) : [];
            renderizar();
        });
    }

    function procv(cod) {
        const info = produtosGlobal[cod.toUpperCase()];
        document.getElementById('mov_nome').value = info ? info.prod : "";
    }

    function salvarProduto() {
        const cod = document.getElementById('cad_cod').value.toUpperCase();
        const prod = document.getElementById('cad_prod').value;
        const desc = document.getElementById('cad_desc').value;
        db.ref('produtos/' + cod).set({ prod, desc }).then(() => alert("Cadastrado!"));
    }

    function lancarMovimento() {
        const cod = document.getElementById('mov_cod').value.toUpperCase();
        const qtd = parseInt(document.getElementById('mov_qtd').value);
        const tipo = document.getElementById('mov_tipo').value;
        const ope = document.getElementById('user-display').innerText; // Pega o email do login

        if(!produtosGlobal[cod] || !qtd) return alert("Erro nos dados!");

        const registro = {
            data: new Date().toLocaleString('pt-pt'),
            tipo, cod, qtd, ope, prod: produtosGlobal[cod].prod
        };

        db.ref('movimentacoes').push(registro).then(() => {
            document.getElementById('mov_cod').value = "";
            document.getElementById('mov_qtd').value = "";
            alert("Sucesso!");
        });
    }

    function renderizar() {
        const corpo = document.getElementById('corpoSaldo');
        corpo.innerHTML = '';
        const saldos = {};
        historicoGlobal.forEach(l => {
            if(!saldos[l.cod]) saldos[l.cod] = { prod: l.prod, e: 0, s: 0 };
            if(l.tipo === 'ENTRADA') saldos[l.cod].e += l.qtd; else saldos[l.cod].s += l.qtd;
        });
        for(let c in saldos) {
            const total = saldos[c].e - saldos[c].s;
            corpo.innerHTML += `<tr><td>${c}</td><td>${saldos[c].prod}</td><td>${total}</td><td><span class="status-pill bg-ok">ATIVO</span></td></tr>`;
        }
    }
</script>
</body>
</html>
