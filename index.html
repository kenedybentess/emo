<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque Online</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
  .header-left h1 { font-size: 28px; margin-bottom: 10px; }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav button { padding: 10px 20px; border: none; border-radius: 8px; background: #e8e8ed; cursor: pointer; font-size: 14px; font-weight: 500; }
    nav button.active { background: #007aff; color: white; }
  .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .metric { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; }
  .metric h3 { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
  .metric p { font-size: 32px; font-weight: 700; }
  .metric.alert { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e8e8ed; }
    th { font-weight: 600; color: #6e6e73; font-size: 13px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .badge.ok { background: #d1f4e0; color: #0a5; }
  .badge.warn { background: #ffe4b3; color: #a60; }
  .badge.danger { background: #ffd4d4; color: #c00; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
  .btn-primary { background: #007aff; color: white; }
  .btn-success { background: #34c759; color: white; }
  .btn-danger { background: #ff3b30; color: white; }
  .btn-warning { background: #ff9500; color: white; }
  .btn-small { padding: 6px 12px; font-size: 12px; }
  .actions { display: flex; gap: 8px; }
  .hidden { display: none!important; }
  .alerta { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
  .sync-status { position: fixed; bottom: 20px; right: 20px; background: #34c759; color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999; }
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; }
  .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; margin: 20px; max-height: 90vh; overflow-y: auto; }
  .modal-content h2 { margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #6e6e73; }
  .variacao-item { background: #f5f5f7; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; align-items: end; }
  .variacao-item input { margin-bottom: 0; }
  .expand-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 5px; }
  .sub-row { background: #fafafa; }
  .sub-row td { padding-left: 40px; }
  .aviso-sem-login { background: #ff9500; color: white; padding: 10px; text-align: center; font-weight: 600; }
</style>
</head>
<body>

<div class="aviso-sem-login">⚠️ MODO SEM LOGIN ATIVO - QUALQUER PESSOA COM O LINK PODE EDITAR</div>

<div id="sistema" class="container">
    <header>
        <div class="header-left">
            <h1>📦 Estoque Online</h1>
            <nav>
                <button onclick="showTab('dashboard')" class="active" id="btn-dashboard">Dashboard</button>
                <button onclick="showTab('produtos')" id="btn-produtos">Produtos</button>
                <button onclick="showTab('movimentar')" id="btn-movimentar">Entrada/Saída</button>
                <button onclick="showTab('historico')" id="btn-historico">Histórico</button>
            </nav>
        </div>
    </header>

    <div id="dashboard" class="tab">
        <div class="grid" id="metrics"></div>
        <div class="card">
            <h2>⚠️ Alertas de Estoque Baixo</h2>
            <div id="alertas"></div>
        </div>
    </div>

    <div id="produtos" class="tab hidden">
        <div class="card">
            <h2>Cadastrar Produto Pai</h2>
            <label>Nome do Produto*</label>
            <input type="text" id="nomeProduto" placeholder="Ex: Camiseta Polo Azul" style="margin-bottom:15px;">
            <label>Descrição</label>
            <textarea id="descProduto" placeholder="Detalhes do produto" rows="2" style="margin-bottom:15px;"></textarea>
            <label>Estoque Mínimo Total</label>
            <input type="number" id="minimoProduto" placeholder="Mínimo" min="0" value="0" style="margin-bottom:15px;">
            <h3 style="margin: 20px 0 10px;">Códigos / SKUs</h3>
            <div id="variacoesList"></div>
            <button class="btn btn-success btn-small" onclick="addVariacaoCampo()" style="margin-bottom:15px;">+ Adicionar Código</button>
            <br>
            <button class="btn btn-primary" onclick="addProduto()">Cadastrar Produto</button>
        </div>
        <div class="card">
            <h2>Lista de Produtos</h2>
            <input type="text" id="busca" placeholder="Buscar por nome ou código..." onkeyup="renderProdutos()" style="margin-bottom:15px;">
            <div style="overflow-x:auto;">
                <table id="tabela-produtos"></table>
            </div>
        </div>
    </div>

    <div id="movimentar" class="tab hidden">
        <div class="card">
            <h2>Registrar Movimentação</h2>
            <div class="form-grid">
                <select id="mov-produto" onchange="updateVariacoesMov()"></select>
                <select id="mov-variacao" onchange="updateSaldo()"></select>
                <select id="mov-tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
                <input type="number" id="mov-qtd" placeholder="Quantidade" min="1" value="1">
            </div>
            <p id="saldo-atual" style="margin:15px 0; font-weight:600;"></p>
            <button class="btn btn-success" onclick="registrarMov()">Registrar Movimentação</button>
        </div>
    </div>

    <div id="historico" class="tab hidden">
        <div class="card">
            <h2>Histórico de Movimentações</h2>
            <div class="form-grid">
                <select id="filtro-produto" onchange="updateFiltrosHistorico()" style="max-width:300px;">
                    <option value="">Todos os produtos</option>
                </select>
                <select id="filtro-variacao" onchange="renderHistorico()" style="max-width:300px;">
                    <option value="">Todas as variações</option>
                </select>
            </div>
            <div style="overflow-x:auto;">
                <table id="tabela-historico"></table>
            </div>
        </div>
    </div>
</div>

<div id="modalEditarProduto" class="modal hidden">
    <div class="modal-content">
        <h2>Editar Produto</h2>
        <input type="hidden" id="editProdId">
        <label>Nome do Produto</label>
        <input type="text" id="editNomeProduto" placeholder="Nome" style="margin-bottom:15px;">
        <label>Descrição</label>
        <textarea id="editDescProduto" placeholder="Descrição" rows="2" style="margin-bottom:15px;"></textarea>
        <label>Estoque Mínimo Total</label>
        <input type="number" id="editMinimoProduto" placeholder="Mínimo" min="0" style="margin-bottom:15px;">
        <h3 style="margin: 20px 0 10px;">Códigos / SKUs</h3>
        <div id="editVariacoesList"></div>
        <button class="btn btn-success btn-small" onclick="addVariacaoEdit()" style="margin-bottom:15px;">+ Adicionar Código</button>
        <br>
        <button class="btn btn-success" onclick="salvarEdicaoProduto()" style="width:100%;margin-bottom:10px;">Salvar Alterações</button>
        <button class="btn btn-danger" onclick="fecharModalProduto()" style="width:100%;">Cancelar</button>
    </div>
</div>

<div id="syncStatus" class="sync-status hidden">✓ Sincronizado</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, push, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyD2IZIVK0FKwo8ADp1t1X87VNrB-HP0tCY",
  authDomain: "controle-estoque-d94e3.firebaseapp.com",
  databaseURL: "https://controle-estoque-d94e3-default-rtdb.firebaseio.com",
  projectId: "controle-estoque-d94e3",
  storageBucket: "controle-estoque-d94e3.firebasestorage.app",
  messagingSenderId: "622590910156",
  appId: "1:622590910156:web:ab851e8b85bb5092296c69"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let produtosCache = [];
let movimentacoesCache = [];
let variacoesTemp = [];
let variacoesEditTemp = [];
let produtosExpandidos = {};

window.addVariacaoCampo = () => {
    const id = Date.now();
    variacoesTemp.push({ tempId: id, codigo: '', qtd: 0 });
    renderVariacoes();
};

function renderVariacoes() {
    const html = variacoesTemp.map(v => `
        <div class="variacao-item">
            <input type="text" placeholder="Código ex: P-001" value="${v.codigo}" onchange="updateVariacao('${v.tempId}', 'codigo', this.value)">
            <input type="number" placeholder="Qtd" value="${v.qtd}" min="0" onchange="updateVariacao('${v.tempId}', 'qtd', this.value)">
            <button class="btn btn-danger btn-small" onclick="removeVariacao('${v.tempId}')">X</button>
        </div>
    `).join('');
    document.getElementById('variacoesList').innerHTML = html || '<p style="color:#8e8e93;">Adicione pelo menos 1 código</p>';
}

window.updateVariacao = (tempId, campo, valor) => {
    const v = variacoesTemp.find(x => x.tempId == tempId);
    if (v) v[campo] = campo === 'qtd'? parseInt(valor) || 0 : valor;
};

window.removeVariacao = (tempId) => {
    variacoesTemp = variacoesTemp.filter(x => x.tempId!= tempId);
    renderVariacoes();
};

window.addProduto = async () => {
    const nome = document.getElementById('nomeProduto').value.trim();
    const desc = document.getElementById('descProduto').value.trim();
    const minimo = parseInt(document.getElementById('minimoProduto').value) || 0;
    if (!nome) return alert('Preencha o Nome do Produto!');
    if (variacoesTemp.length === 0) return alert('Adicione pelo menos 1 código!');
    const codigos = variacoesTemp.map(v => v.codigo.trim()).filter(c => c);
    if (codigos.length === 0) return alert('Preencha os códigos das variações!');
    for (const p of produtosCache) {
        for (const v of p.variacoes || []) {
            if (codigos.includes(v.codigo)) {
                return alert(`Código ${v.codigo} já existe no produto ${p.nome}`);
            }
        }
    }
    const produto = {
        nome,
        descricao: desc,
        minimo,
        criado: new Date().toLocaleString('pt-BR'),
        variacoes: variacoesTemp.filter(v => v.codigo.trim()).map(v => ({
            codigo: v.codigo.trim(),
            qtd: parseInt(v.qtd) || 0
        }))
    };
    await push(ref(db, 'produtos'), produto);
    document.getElementById('nomeProduto').value = '';
    document.getElementById('descProduto').value = '';
    document.getElementById('minimoProduto').value = '0';
    variacoesTemp = [];
    renderVariacoes();
    alert('Produto cadastrado!');
};

window.abrirEditarProduto = (prodId) => {
    const p = produtosCache.find(x => x.id === prodId);
    if (!p) return;
    document.getElementById('editProdId').value = prodId;
    document.getElementById('editNomeProduto').value = p.nome;
    document.getElementById('editDescProduto').value = p.descricao || '';
    document.getElementById('editMinimoProduto').value = p.minimo || 0;
    variacoesEditTemp = (p.variacoes || []).map(v => ({...v, tempId: Date.now() + Math.random() }));
    renderVariacoesEdit();
    document.getElementById('modalEditarProduto').classList.remove('hidden');
};

window.fecharModalProduto = () => {
    document.getElementById('modalEditarProduto').classList.add('hidden');
    variacoesEditTemp = [];
};

window.addVariacaoEdit = () => {
    const id = Date.now() + Math.random();
    variacoesEditTemp.push({ tempId: id, codigo: '', qtd: 0 });
    renderVariacoesEdit();
};

function renderVariacoesEdit() {
    const html = variacoesEditTemp.map(v => `
        <div class="variacao-item">
            <input type="text" placeholder="Código ex: P-001" value="${v.codigo}" onchange="updateVariacaoEdit('${v.tempId}', 'codigo', this.value)">
            <input type="number" placeholder="Qtd" value="${v.qtd}" min="0" onchange="updateVariacaoEdit('${v.tempId}', 'qtd', this.value)">
            <button class="btn btn-danger btn-small" onclick="removeVariacaoEdit('${v.tempId}')">X</button>
        </div>
    `).join('');
    document.getElementById('editVariacoesList').innerHTML = html || '<p style="color:#8e8e93;">Adicione pelo menos 1 código</p>';
}

window.updateVariacaoEdit = (tempId, campo, valor) => {
    const v = variacoesEditTemp.find(x => x.tempId == tempId);
    if (v) v[campo] = campo === 'qtd'? parseInt(valor) || 0 : valor;
};

window.removeVariacaoEdit = (tempId) => {
    variacoesEditTemp = variacoesEditTemp.filter(x => x.tempId!= tempId);
    renderVariacoesEdit();
};

window.salvarEdicaoProduto = async () => {
    const prodId = document.getElementById('editProdId').value;
    const nome = document.getElementById('editNomeProduto').value.trim();
    const desc = document.getElementById('editDescProduto').value.trim();
    const minimo = parseInt(document.getElementById('editMinimoProduto').value) || 0;
    if (!nome) return alert('Preencha o Nome do Produto!');
    if (variacoesEditTemp.length === 0) return alert('Adicione pelo menos 1 código!');
    const codigos = variacoesEditTemp.map(v => v.codigo.trim()).filter(c => c);
    if (codigos.length === 0) return alert('Preencha os códigos das variações!');
    for (const p of produtosCache) {
        if (p.id === prodId) continue;
        for (const v of p.variacoes || []) {
            if (codigos.includes(v.codigo)) {
                return alert(`Código ${v.codigo} já existe no produto ${p.nome}`);
            }
        }
    }
    await update(ref(db, `produtos/${prodId}`), {
        nome,
        descricao: desc,
        minimo,
        variacoes: variacoesEditTemp.filter(v => v.codigo.trim()).map(v => ({
            codigo: v.codigo.trim(),
            qtd: parseInt(v.qtd) || 0
        }))
    });
    alert('Produto atualizado!');
    fecharModalProduto();
};

window.deleteProduto = async (id) => {
    if (confirm('Excluir este produto e todas suas variações?')) {
        await remove(ref(db, `produtos/${id}`));
    }
};

window.toggleProduto = (prodId) => {
    produtosExpandidos[prodId] =!produtosExpandidos[prodId];
    renderProdutos();
};

window.registrarMov = async () => {
    const produtoId = document.getElementById('mov-produto').value;
    const variacaoCodigo = document.getElementById('mov-variacao').value;
    const tipo = document.getElementById('mov-tipo').value;
    const qtd = parseInt(document.getElementById('mov-qtd').value);
    if (!produtoId ||!variacaoCodigo ||!qtd) return alert('Selecione produto, variação e quantidade');
    const produto = produtosCache.find(p => p.id === produtoId);
    const variacao = produto.variacoes.find(v => v.codigo === variacaoCodigo);
    if (tipo === 'saida' && variacao.qtd < qtd) return alert('Estoque insuficiente!');
    const novaQtd = tipo === 'entrada'? variacao.qtd + qtd : variacao.qtd - qtd;
    const novasVariacoes = produto.variacoes.map(v =>
        v.codigo === variacaoCodigo? {...v, qtd: novaQtd } : v
    );
    await update(ref(db, `produtos/${produtoId}`), { variacoes: novasVariacoes });
    await push(ref(db, 'movimentacoes'), {
        produtoId: produtoId,
        variacaoCodigo: variacaoCodigo,
        tipo: tipo,
        quantidade: qtd,
        usuario: 'Sem Login',
        data: new Date().toLocaleString('pt-BR'),
        timestamp: Date.now()
    });
    const totalEstoque = novasVariacoes.reduce((sum, v) => sum + v.qtd, 0);
    if (totalEstoque <= produto.minimo) alert(`⚠️ ${produto.nome} atingiu estoque mínimo!`);
    document.getElementById('mov-qtd').value = '1';
    alert('Movimentação registrada!');
};

window.updateVariacoesMov = () => {
    const prodId = document.getElementById('mov-produto').value;
    const produto = produtosCache.find(p => p.id === prodId);
    const select = document.getElementById('mov-variacao');
    if (produto && produto.variacoes) {
        select.innerHTML = produto.variacoes.map(v =>
            `<option value="${v.codigo}">${v.codigo} - Estoque: ${v.qtd}</option>`
        ).join('');
        updateSaldo();
    }
};

window.updateSaldo = () => {
    const prodId = document.getElementById('mov-produto').value;
    const varCodigo = document.getElementById('mov-variacao').value;
    const p = produtosCache.find(x => x.id === prodId);
    if (p) {
        const v = p.variacoes.find(x => x.codigo === varCodigo);
        const total = p.variacoes.reduce((sum, x) => sum + x.qtd, 0);
        if (v) {
            document.getElementById('saldo-atual').innerHTML =
                `Variação: <strong>${v.qtd}</strong> | Total do produto: <strong>${total}</strong> | Mínimo: ${p.minimo}`;
        }
    }
};

window.showTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.remove('hidden');
    document.getElementById('btn-' + tab).classList.add('active');
    if (tab === 'historico') updateFiltrosHistorico();
};

window.updateFiltrosHistorico = () => {
    const selectProd = document.getElementById('filtro-produto');
    const selectVar = document.getElementById('filtro-variacao');
    const prodId = selectProd.value;
    selectProd.innerHTML = '<option value="">Todos os produtos</option>' +
        produtosCache.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
    if (prodId) {
        const prod = produtosCache.find(p => p.id === prodId);
        selectVar.innerHTML = '<option value="">Todas as variações</option>' +
            (prod?.variacoes || []).map(v => `<option value="${v.codigo}">${v.codigo}</option>`).join('');
    }
    renderHistorico();
};

function escutarDados() {
    onValue(ref(db, 'produtos'), (snapshot) => {
        const data = snapshot.val() || {};
        produtosCache = Object.entries(data).map(([id, val]) => ({ id,...val }));
        renderProdutos();
        renderDashboard();
        renderMovimentar();
        mostrarSync();
    });
    onValue(ref(db, 'movimentacoes'), (snapshot) => {
        const data = snapshot.val() || {};
        movimentacoesCache = Object.entries(data).map(([id, val]) => ({ id,...val }))
      .sort((a, b) => b.timestamp - a.timestamp);
        renderHistorico();
    });
}

function mostrarSync() {
    const el = document.getElementById('syncStatus');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 2000);
}

function renderDashboard() {
    const totalProdutos = produtosCache.length;
    const totalVariacoes = produtosCache.reduce((sum, p) => sum + (p.variacoes?.length || 0), 0);
    const totalEstoque = produtosCache.reduce((sum, p) => sum + (p.variacoes?.reduce((s, v) => s + v.qtd, 0) || 0), 0);
    const baixo = produtosCache.filter(p => {
        const total = (p.variacoes || []).reduce((sum, v) => sum + v.qtd, 0);
        return total <= p.minimo;
    }).length;
    document.getElementById('metrics').innerHTML = `
        <div class="metric"><h3>Produtos Pai</h3><p>${totalProdutos}</p></div>
        <div class="metric"><h3>Total de SKUs</h3><p>${totalVariacoes}</p></div>
        <div class="metric"><h3>Itens em Estoque</h3><p>${totalEstoque}</p></div>
        <div class="metric ${baixo > 0? 'alert' : ''}"><h3>Abaixo do Mínimo</h3><p>${baixo}</p></div>
    `;
    const alertas = produtosCache.filter(p => {
        const total = (p.variacoes || []).reduce((sum, v) => sum + v.qtd, 0);
        return total <= p.minimo;
    });
    if (alertas.length > 0) {
        document.getElementById('alertas').innerHTML = `
            <div class="alerta">⚠️ ${alertas.length} produto(s) com estoque baixo</div>
            <table>
                <thead><tr><th>Produto</th><th>Estoque Total</th><th>Mínimo</th></tr></thead>
                <tbody>
                    ${alertas.map(p => {
                        const total = (p.variacoes || []).reduce((sum, v) => sum + v.qtd, 0);
                        return `
                        <tr>
                            <td>${p.nome}</td>
                            <td><span class="badge danger">${total}</span></td>
                            <td>${p.minimo}</td>
                        </tr>
                    `}).join('')}
                </tbody>
            </table>
        `;
    } else {
        document.getElementById('alertas').innerHTML = '<p style="color:#0a5;">✓ Todos os produtos acima do mínimo</p>';
    }
}

function renderProdutos() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const filtrados = produtosCache.filter(p =>
        p.nome.toLowerCase().includes(busca) ||
        (p.variacoes || []).some(v => v.codigo.toLowerCase().includes(busca))
    );
    let html = `<thead><tr><th style="width:40px;"></th><th>Produto</th><th>Códigos</th><th>Estoque Total</th><th>Mínimo</th><th>Ações</th></tr></thead><tbody>`;

    filtrados.forEach(p => {
        const total = (p.variacoes || []).reduce((sum, v) => sum + v.qtd, 0);
        const status = total === 0? 'danger' : total <= p.minimo? 'warn' : 'ok';
        const expandido = produtosExpandidos[p.id];
        html += `
            <tr>
                <td><button class="expand-btn" onclick="toggleProduto('${p.id}')">${expandido? '▼' : '▶'}</button></td>
                <td><strong>${p.nome}</strong><br><span style="font-size:12px;color:#6e6e73;">${p.descricao || ''}</span></td>
                <td>${(p.variacoes || []).length} SKUs</td>
                <td><span class="badge ${status}">${total}</span></td>
                <td>${p.minimo}</td>
                <td class="actions">
                    <button class="btn btn-warning btn-small" onclick="abrirEditarProduto('${p.id}')">Editar</button>
                    <button class="btn btn-danger btn-small" onclick="deleteProduto('${p.id}')">Excluir</button>
                </td>
            </tr>
        `;
        if (expandido) {
            (p.variacoes || []).forEach(v => {
                const vStatus = v.qtd === 0? 'danger' : 'ok';
                html += `
                    <tr class="sub-row">
                        <td></td>
                        <td colspan="2">└ ${v.codigo}</td>
                        <td><span class="badge ${vStatus}">${v.qtd}</span></td>
                        <td colspan="2"></td>
                    </tr>
                `;
            });
        }
    });
    html += '</tbody>';
    document.getElementById('tabela-produtos').innerHTML = html;
}

function renderMovimentar() {
    const select = document.getElementById('mov-produto');
    select.innerHTML = produtosCache.map(p =>
        `<option value="${p.id}">${p.nome}</option>`
    ).join('');
    if (produtosCache.length > 0) updateVariacoesMov();
}

function renderHistorico() {
    const filtroId = document.getElementById('filtro-produto').value;
    const filtroVar = document.getElementById('filtro-variacao').value;
    let movs = movimentacoesCache;
    if (filtroId) movs = movs.filter(m => m.produtoId == filtroId);
    if (filtroVar) movs = movs.filter(m => m.variacaoCodigo == filtroVar);
    const html = `
        <thead><tr><th>Data</th><th>Produto</th><th>Código</th><th>Tipo</th><th>Qtd</th><th>Usuário</th></tr></thead>
        <tbody>
            ${movs.slice(0, 100).map(m => {
                const p = produtosCache.find(x => x.id === m.produtoId);
                return `
                    <tr>
                        <td>${m.data}</td>
                        <td>${p? p.nome : 'Excluído'}</td>
                        <td>${m.variacaoCodigo}</td>
                        <td><span class="badge ${m.tipo === 'entrada'? 'ok' : 'warn'}">${m.tipo}</span></td>
                        <td>${m.quantidade}</td>
                        <td>${m.usuario || '-'}</td>
                    </tr>
                `;
            }).join('')}
        </tbody>
    `;
    document.getElementById('tabela-historico').innerHTML = html;
}

// Inicia
addVariacaoCampo();
escutarDados();
</script>
