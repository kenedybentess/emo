<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    h1 { font-size: 28px; margin-bottom: 10px; }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav button { padding: 10px 20px; border: none; border-radius: 8px; background: #e8e8ed; cursor: pointer; font-size: 14px; font-weight: 500; }
    nav button.active { background: #007aff; color: white; }
    nav button:hover { opacity: 0.8; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .metric { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; }
    .metric h3 { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    .metric p { font-size: 32px; font-weight: 700; }
    .metric.alert { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e8e8ed; }
    th { font-weight: 600; color: #6e6e73; font-size: 13px; text-transform: uppercase; }
    tr:hover { background: #f5f5f7; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge.ok { background: #d1f4e0; color: #0a5; }
    .badge.warn { background: #ffe4b3; color: #a60; }
    .badge.danger { background: #ffd4d4; color: #c00; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #007aff; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-primary { background: #007aff; color: white; }
    .btn-success { background: #34c759; color: white; }
    .btn-danger { background: #ff3b30; color: white; }
    .btn:hover { opacity: 0.9; }
    .actions { display: flex; gap: 8px; }
    .actions button { padding: 6px 12px; font-size: 12px; }
    .hidden { display: none; }
    .alerta { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
    @media (max-width: 768px) { 
        table { font-size: 13px; }
        th, td { padding: 8px 4px; }
    }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>📦 Controle de Estoque</h1>
        <nav>
            <button onclick="showTab('dashboard')" class="active" id="btn-dashboard">Dashboard</button>
            <button onclick="showTab('produtos')" id="btn-produtos">Produtos</button>
            <button onclick="showTab('movimentar')" id="btn-movimentar">Entrada/Saída</button>
            <button onclick="showTab('historico')" id="btn-historico">Histórico</button>
        </nav>
    </header>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab">
        <div class="grid" id="metrics"></div>
        <div class="card">
            <h2>⚠️ Alertas de Estoque Baixo</h2>
            <div id="alertas"></div>
        </div>
        <div class="card">
            <h2>📊 Top 5 Produtos por Valor</h2>
            <div id="grafico"></div>
        </div>
    </div>

    <!-- PRODUTOS -->
    <div id="produtos" class="tab hidden">
        <div class="card">
            <h2>Cadastrar Produto</h2>
            <div class="form-grid">
                <input type="text" id="codigo" placeholder="Código*" required>
                <input type="text" id="nome" placeholder="Nome do Produto*" required>
                <input type="text" id="categoria" placeholder="Categoria">
                <select id="unidade">
                    <option>UN</option><option>CX</option><option>KG</option>
                    <option>L</option><option>M</option><option>PCT</option>
                </select>
                <input type="number" id="qtd" placeholder="Qtd Inicial" min="0" value="0">
                <input type="number" id="minimo" placeholder="Estoque Mínimo" min="0" value="0">
                <input type="number" id="preco" placeholder="Preço Unit R$" min="0" step="0.01">
                <input type="text" id="local" placeholder="Localização">
            </div>
            <button class="btn btn-primary" onclick="addProduto()">Cadastrar Produto</button>
        </div>
        <div class="card">
            <h2>Lista de Produtos</h2>
            <div style="margin-bottom:15px;">
                <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="renderProdutos()">
                <button class="btn btn-success" onclick="exportarCSV()">Exportar CSV</button>
            </div>
            <div style="overflow-x:auto;">
                <table id="tabela-produtos"></table>
            </div>
        </div>
    </div>

    <!-- MOVIMENTAR -->
    <div id="movimentar" class="tab hidden">
        <div class="card">
            <h2>Registrar Movimentação</h2>
            <div class="form-grid">
                <select id="mov-produto" onchange="updateSaldo()"></select>
                <select id="mov-tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
                <input type="number" id="mov-qtd" placeholder="Quantidade" min="1" value="1">
                <input type="text" id="mov-motivo" placeholder="Motivo/Obs">
            </div>
            <p id="saldo-atual" style="margin:15px 0; font-weight:600;"></p>
            <button class="btn btn-success" onclick="registrarMov()">Registrar Movimentação</button>
        </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="historico" class="tab hidden">
        <div class="card">
            <h2>Histórico de Movimentações</h2>
            <select id="filtro-produto" onchange="renderHistorico()" style="margin-bottom:15px; max-width:300px;">
                <option value="">Todos os produtos</option>
            </select>
            <div style="overflow-x:auto;">
                <table id="tabela-historico"></table>
            </div>
        </div>
    </div>
</div>

<script>
// Banco de dados localStorage
let db = {
    produtos: JSON.parse(localStorage.getItem('produtos') || '[]'),
    movimentacoes: JSON.parse(localStorage.getItem('movimentacoes') || '[]')
};

function saveDB() {
    localStorage.setItem('produtos', JSON.stringify(db.produtos));
    localStorage.setItem('movimentacoes', JSON.stringify(db.movimentacoes));
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.remove('hidden');
    document.getElementById('btn-' + tab).classList.add('active');

    if (tab === 'dashboard') renderDashboard();
    if (tab === 'produtos') renderProdutos();
    if (tab === 'movimentar') renderMovimentar();
    if (tab === 'historico') renderHistorico();
}

function addProduto() {
    const p = {
        id: Date.now(),
        codigo: document.getElementById('codigo').value.trim(),
        nome: document.getElementById('nome').value.trim(),
        categoria: document.getElementById('categoria').value.trim(),
        unidade: document.getElementById('unidade').value,
        qtd: parseInt(document.getElementById('qtd').value) || 0,
        minimo: parseInt(document.getElementById('minimo').value) || 0,
        preco: parseFloat(document.getElementById('preco').value) || 0,
        local: document.getElementById('local').value.trim(),
        criado: new Date().toLocaleString('pt-BR')
    };

    if (!p.codigo || !p.nome) {
        alert('Preencha Código e Nome!');
        return;
    }

    if (db.produtos.find(x => x.codigo === p.codigo)) {
        alert('Código já existe!');
        return;
    }

    db.produtos.push(p);
    saveDB();

    // Limpar form
    document.querySelectorAll('#produtos input').forEach(i => i.value = '');
    document.getElementById('qtd').value = '0';
    document.getElementById('minimo').value = '0';

    alert('Produto cadastrado!');
    renderProdutos();
}

function deleteProduto(id) {
    if (confirm('Excluir este produto? O histórico será mantido.')) {
        db.produtos = db.produtos.filter(p => p.id !== id);
        saveDB();
        renderProdutos();
        renderDashboard();
    }
}

function registrarMov() {
    const produtoId = parseInt(document.getElementById('mov-produto').value);
    const tipo = document.getElementById('mov-tipo').value;
    const qtd = parseInt(document.getElementById('mov-qtd').value);
    const motivo = document.getElementById('mov-motivo').value;

    if (!produtoId || !qtd) return alert('Selecione produto e quantidade');

    const produto = db.produtos.find(p => p.id === produtoId);

    if (tipo === 'saida' && produto.qtd < qtd) {
        return alert('Estoque insuficiente!');
    }

    produto.qtd += tipo === 'entrada' ? qtd : -qtd;

    db.movimentacoes.unshift({
        id: Date.now(),
        produtoId: produtoId,
        tipo: tipo,
        quantidade: qtd,
        motivo: motivo,
        data: new Date().toLocaleString('pt-BR')
    });

    saveDB();

    if (produto.qtd <= produto.minimo) {
        alert(`⚠️ Atenção: ${produto.nome} atingiu estoque mínimo!`);
    }

    document.getElementById('mov-qtd').value = '1';
    document.getElementById('mov-motivo').value = '';
    updateSaldo();
    alert('Movimentação registrada!');
}

function updateSaldo() {
    const id = parseInt(document.getElementById('mov-produto').value);
    const p = db.produtos.find(x => x.id === id);
    if (p) {
        document.getElementById('saldo-atual').innerHTML =
            `Estoque atual: <strong>${p.qtd} ${p.unidade}</strong> | Mínimo: ${p.minimo} | Local: ${p.local || '-'}`;
    }
}

function renderDashboard() {
    const total = db.produtos.length;
    const valorTotal = db.produtos.reduce((sum, p) => sum + (p.qtd * p.preco), 0);
    const baixo = db.produtos.filter(p => p.qtd <= p.minimo).length;
    const cats = new Set(db.produtos.map(p => p.categoria).filter(Boolean)).size;

    document.getElementById('metrics').innerHTML = `
        <div class="metric"><h3>Total de Produtos</h3><p>${total}</p></div>
        <div class="metric"><h3>Valor em Estoque</h3><p>R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p></div>
        <div class="metric ${baixo > 0 ? 'alert' : ''}"><h3>Abaixo do Mínimo</h3><p>${baixo}</p></div>
        <div class="metric"><h3>Categorias</h3><p>${cats}</p></div>
    `;

    const alertasProdutos = db.produtos.filter(p => p.qtd <= p.minimo);
    if (alertasProdutos.length > 0) {
        document.getElementById('alertas').innerHTML = `
            <div class="alerta">⚠️ ${alertasProdutos.length} produto(s) com estoque baixo</div>
            <table>
                <thead><tr><th>Código</th><th>Nome</th><th>Atual</th><th>Mínimo</th><th>Local</th></tr></thead>
                <tbody>
                    ${alertasProdutos.map(p => `
                        <tr>
                            <td>${p.codigo}</td>
                            <td>${p.nome}</td>
                            <td><span class="badge danger">${p.qtd}</span></td>
                            <td>${p.minimo}</td>
                            <td>${p.local || '-'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } else {
        document.getElementById('alertas').innerHTML = '<p style="color:#0a5;">✓ Todos os produtos acima do mínimo</p>';
    }

    const top5 = db.produtos
        .map(p => ({ ...p, valor: p.qtd * p.preco }))
        .sort((a, b) => b.valor - a.valor)
        .slice(0, 5);

    document.getElementById('grafico').innerHTML = `
        <table>
            <thead><tr><th>Produto</th><th>Qtd</th><th>Valor Unit</th><th>Valor Total</th></tr></thead>
            <tbody>
                ${top5.map(p => `
                    <tr>
                        <td>${p.nome}</td>
                        <td>${p.qtd}</td>
                        <td>R$ ${p.preco.toFixed(2)}</td>
                        <td><strong>R$ ${p.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderProdutos() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const filtrados = db.produtos.filter(p =>
        p.nome.toLowerCase().includes(busca) ||
        p.codigo.toLowerCase().includes(busca) ||
        p.categoria.toLowerCase().includes(busca)
    );

    const html = `
        <thead>
            <tr>
                <th>Código</th><th>Nome</th><th>Cat.</th><th>Estoque</th>
                <th>Mín</th><th>Preço</th><th>Total</th><th>Local</th><th>Ações</th>
            </tr>
        </thead>
        <tbody>
            ${filtrados.map(p => {
        const status = p.qtd === 0 ? 'danger' : p.qtd <= p.minimo ? 'warn' : 'ok';
        return `
                    <tr>
                        <td>${p.codigo}</td>
                        <td><strong>${p.nome}</strong></td>
                        <td>${p.categoria || '-'}</td>
                        <td><span class="badge ${status}">${p.qtd} ${p.unidade}</span></td>
                        <td>${p.minimo}</td>
                        <td>R$ ${p.preco.toFixed(2)}</td>
                        <td>R$ ${(p.qtd * p.preco).toFixed(2)}</td>
                        <td>${p.local || '-'}</td>
                        <td class="actions">
                            <button class="btn btn-danger" onclick="deleteProduto(${p.id})">Excluir</button>
                        </td>
                    </tr>
                `;
    }).join('')}
        </tbody>
    `;
    document.getElementById('tabela-produtos').innerHTML = html;
}

function renderMovimentar() {
    const select = document.getElementById('mov-produto');
    select.innerHTML = db.produtos.map(p =>
        `<option value="${p.id}">${p.codigo} - ${p.nome}</option>`
    ).join('');
    if (db.produtos.length > 0) updateSaldo();
}

function renderHistorico() {
    const filtroId = document.getElementById('filtro-produto').value;

    // Popular filtro
    const filtroSelect = document.getElementById('filtro-produto');
    filtroSelect.innerHTML = '<option value="">Todos os produtos</option>' +
        db.produtos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
    filtroSelect.value = filtroId;

    let movs = db.movimentacoes;
    if (filtroId) {
        movs = movs.filter(m => m.produtoId == filtroId);
    }

    const html = `
        <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Motivo</th></tr></thead>
        <tbody>
            ${movs.slice(0, 100).map(m => {
        const p = db.produtos.find(x => x.id === m.produtoId);
        return `
                    <tr>
                        <td>${m.data}</td>
                        <td>${p ? p.nome : 'Excluído'}</td>
                        <td><span class="badge ${m.tipo === 'entrada' ? 'ok' : 'warn'}">${m.tipo}</span></td>
                        <td>${m.quantidade}</td>
                        <td>${m.motivo || '-'}</td>
                    </tr>
                `;
    }).join('')}
        </tbody>
    `;
    document.getElementById('tabela-historico').innerHTML = html;
}

function exportarCSV() {
    const csv = [
        ['Código', 'Nome', 'Categoria', 'Estoque', 'Mínimo', 'Preço', 'Total', 'Local'],
        ...db.produtos.map(p => [
            p.codigo, p.nome, p.categoria, p.qtd, p.minimo,
            p.preco, (p.qtd * p.preco).toFixed(2), p.local
        ])
    ].map(row => row.join(',')).join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `estoque_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}

// Inicializar
renderDashboard();
</script>
</body>
</html>
